# Cloudflare Worker config for the off-GitHub morning-email backstop.
# Deploy with: wrangler deploy   (run from this folder)
#
# Free tier covers this comfortably: a handful of cron invocations a day,
# each making two tiny GitHub API calls.

name = "alvys-scorecard-cron"
main = "worker.js"
compatibility_date = "2025-01-01"

# Cloudflare cron is fixed UTC with no DST handling — but that's fine here:
# the workflows we trigger are idempotent (marker-gated) and workflow_dispatch
# bypasses their CT-hour gate, so an off-by-an-hour fire across the DST flip is
# harmless. We arm two daily slots that cover ~6:45am Central in BOTH seasons,
# giving GitHub's own 5:00–6:00am crons first crack so on normal mornings the
# healthchecks just no-op:
#
#   45 11 UTC  ->  6:45am CDT  /  5:45am CST
#   45 12 UTC  ->  7:45am CDT  /  6:45am CST
#
# To trim to one fire/day you can drop either line; reliability is the reason
# both are armed.
[triggers]
crons = ["45 11 * * *", "45 12 * * *"]

# Cheap observability so a broken backstop doesn't itself go silent.
[observability]
enabled = true
