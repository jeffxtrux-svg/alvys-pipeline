# Safety & Compliance Report — daily HTML brief at 5am CT focused on
# driver safety, HOS compliance, and vehicle inspection state. Reads
# Samsara_Master.xlsx from OneDrive (same source as the executive
# brief) and emails an HTML body + PDF attachment.
#
# Recipients: Audra (primary) + Jeff + JB (cc) per the accountability
# map in xfreight-employee-responsibilities.md. Manual/push triggers
# send to jeff-only for quiet testing; scheduled crons use the full
# SAFETY_RECIPIENTS secret with a hardcoded fallback.
#
# GitHub Secrets required:
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
#   ONEDRIVE_USER_UPN      — mailbox to send from
#   SAFETY_RECIPIENTS      — standing list (audra@, jeff@, jb@xfreight.net)
#   TEAMS_SAFETY_WEBHOOK   — Teams incoming webhook URL (optional; no-op if unset)

name: Safety & Compliance Report (5am CT)

on:
  workflow_dispatch:
    inputs:
      recipients:
        description: 'Comma-separated recipient override (default: jeff only while testing)'
        required: false
        default: ''
      skip_idempotency:
        description: "Set true to force-resend even if today's marker exists"
        type: boolean
        default: false
  # Reusable so a Refresh-All workflow can call it after the data pulls.
  workflow_call:
  # Editing this file fires a run — handy for triggering from mobile.
  push:
    paths:
      - .github/workflows/safety_compliance_email.yml
  schedule:
    # Same DST-proof pattern as the scorecard: arm both CDT and CST
    # 5am slots + ~1h of backups. The CT-gate step rejects slots that
    # land before 5am Central (off-season cron) and skip 6am (reserved
    # for healthcheck-style backups, matches scorecard convention).
    - cron: '0 10 * * *'    # 5am CDT primary / 4am CST (gated)
    - cron: '30 10 * * *'   # 5:30am CDT backup / 4:30am CST (gated)
    - cron: '0 11 * * *'    # 6am CDT (gated) / 5am CST primary
    - cron: '30 11 * * *'   # 6:30am CDT (gated) / 5:30am CST backup

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  safety_report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Gate to 5am CT or later (skip 6am)
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          if [ "$CT_HOUR" -lt 5 ]; then
            echo "Before 5am CT — skipping this slot."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          elif [ "$CT_HOUR" -eq 6 ]; then
            echo "6am CT slot reserved for healthcheck — skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "5am CT or 7am+ CT — proceeding."
          fi

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies for WeasyPrint
        if: steps.ct_gate.outputs.skip != '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 fonts-liberation

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Build and send Safety & Compliance Report
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          # Recipient routing (mirrors scorecard_email.yml pattern):
          #   dispatch/push with `recipients` input set → use that override
          #   dispatch/push with no input → jeff-only (quiet test send)
          #   scheduled cron → SAFETY_RECIPIENTS secret (standing list)
          #   last fallback → hardcoded Audra + Jeff + JB
          SAFETY_TO_EMAILS: ${{ inputs.recipients != '' && inputs.recipients || ((github.event_name == 'workflow_dispatch' || github.event_name == 'push') && secrets.ONEDRIVE_USER_UPN || secrets.SAFETY_RECIPIENTS || 'audra@xfreight.net,jeff@xfreight.net,jb@xfreight.net') }}
          # Push-triggered runs (mobile escape hatch) bypass the same-day
          # marker so the on-demand resend actually sends. The
          # skip_idempotency dispatch input does the same on demand.
          SAFETY_SKIP_IDEMPOTENCY: ${{ (github.event_name == 'push' || inputs.skip_idempotency) && '1' || '' }}
        run: python -m src.safety_compliance_email

      - name: Post safety summary to Teams
        # Fires after the email send succeeds. Silent no-op if
        # TEAMS_SAFETY_WEBHOOK secret is not yet set.
        if: steps.ct_gate.outputs.skip != '1'
        env:
          TEAMS_SAFETY_WEBHOOK: ${{ secrets.TEAMS_SAFETY_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json, os, datetime, requests
          from pathlib import Path

          webhook = os.environ.get("TEAMS_SAFETY_WEBHOOK", "").strip()
          if not webhook:
              print("TEAMS_SAFETY_WEBHOOK not set — skipping Teams notification.")
              raise SystemExit(0)

          today = datetime.date.today()
          run_url = os.environ.get("RUN_URL", "")

          # Read safety-relevant signals from risk-watch-latest.json.
          # The file is written by the scorecard run; if absent (e.g. on
          # a first-time run before the scorecard has fired) we skip the
          # signal list rather than erroring.
          _WIKI = Path("Karpathy-Wiki/wiki")
          _SAFETY_KEYWORDS = {
              "inspection", "dvir", "hos", "license", "medical", "mvr",
              "csa", "safety", "driver", "speed", "coach",
          }

          signals_path = _WIKI / "risk-watch-latest.json"
          tripped_safety = []
          ok_safety = 0
          if signals_path.exists():
              data = json.loads(signals_path.read_text())
              for s in data.get("signals", []):
                  tags = {t.lower() for t in (s.get("tags") or [])}
                  title_words = set(s.get("title", "").lower().split())
                  is_safety = bool(tags & _SAFETY_KEYWORDS or title_words & _SAFETY_KEYWORDS)
                  if not is_safety:
                      continue
                  if s.get("tripped"):
                      tripped_safety.append(s)
                  else:
                      ok_safety += 1

          # Build Microsoft Teams MessageCard payload.
          sev_color = {"high": "FF0000", "medium": "FF8C00", "low": "FFD700"}
          if tripped_safety:
              theme_color = sev_color.get(
                  (tripped_safety[0].get("severity") or "medium").lower(), "FF8C00"
              )
          else:
              theme_color = "00B050"  # green — all clear

          facts = []
          if tripped_safety:
              for s in tripped_safety[:6]:
                  sev = (s.get("severity") or "medium").capitalize()
                  facts.append({"name": f"[{sev}]", "value": s.get("title", "—")})
          else:
              facts.append({"name": "Status", "value": "All tracked safety signals within threshold."})

          status_line = (
              f"{len(tripped_safety)} signal(s) need attention · {ok_safety} OK"
              if tripped_safety else f"All {ok_safety} tracked signal(s) OK"
          )

          payload = {
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "themeColor": theme_color,
              "summary": f"XFreight Safety & Compliance — {today:%a %b %d}",
              "sections": [{
                  "activityTitle": f"XFreight Safety & Compliance — {today:%A, %B %d, %Y}",
                  "activitySubtitle": status_line,
                  "facts": facts,
              }],
              "potentialAction": [{
                  "@type": "OpenUri",
                  "name": "View workflow run",
                  "targets": [{"os": "default", "uri": run_url}],
              }] if run_url else [],
          }

          resp = requests.post(webhook, json=payload, timeout=30)
          print(f"Teams notification: HTTP {resp.status_code} — {resp.text[:200]}")
          if resp.status_code not in range(200, 300):
              raise SystemExit(1)
          PY

      - name: Notify on failure
        if: failure() && steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          SAFETY_TO_EMAILS: ${{ inputs.recipients != '' && inputs.recipients || ((github.event_name == 'workflow_dispatch' || github.event_name == 'push') && secrets.ONEDRIVE_USER_UPN || secrets.SAFETY_RECIPIENTS || 'audra@xfreight.net,jeff@xfreight.net,jb@xfreight.net') }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          from src.onedrive_upload import get_token
          from src.scorecard_email import send_email
          tok = get_token(
              os.environ["AZURE_TENANT_ID"],
              os.environ["AZURE_CLIENT_ID"],
              os.environ["AZURE_CLIENT_SECRET"],
          )
          to = [e.strip() for e in os.environ.get("SAFETY_TO_EMAILS", "jeff@xfreight.net").split(",") if e.strip()]
          run = os.environ.get("RUN_URL", "")
          html = (
              f"<p>The Safety &amp; Compliance Report job <b>failed</b> &mdash; "
              f"today's report did not send.</p>"
              f"<p>Run log: <a href='{run}'>{run}</a></p>"
          )
          send_email(tok, os.environ["ONEDRIVE_USER_UPN"], to,
                     "⚠️ XFreight Safety & Compliance Report FAILED", html)
          PY
