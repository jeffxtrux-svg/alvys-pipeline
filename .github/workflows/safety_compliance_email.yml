# Safety & Compliance Report — daily PDF brief (v4) at 5am CT focused on
# driver safety, HOS compliance, and vehicle inspection state. Reads
# Samsara_Master.xlsx from OneDrive (same source as the executive
# brief) and emails an HTML body + PDF attachment.
#
# Recipients: Audra (primary) + Jeff + JB (cc) per the accountability
# map in xfreight-employee-responsibilities.md. Manual/push triggers
# send to jeff-only for quiet testing; scheduled crons use the full
# SAFETY_RECIPIENTS secret with a hardcoded fallback.
#
# GitHub Secrets required:
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
#   ONEDRIVE_USER_UPN      — mailbox to send from
#   SAFETY_RECIPIENTS      — standing list (audra@, jeff@, jb@xfreight.net)
#   TEAMS_SAFETY_WEBHOOK   — Teams incoming webhook URL (optional; no-op if unset)

name: Safety & Compliance Report (5am CT)

on:
  workflow_dispatch:
    inputs:
      recipients:
        description: 'Comma-separated recipient override (default: jeff only while testing)'
        required: false
        default: ''
      skip_idempotency:
        description: "Set true to force-resend even if today's marker exists"
        type: boolean
        default: false
  # Reusable so a Refresh-All workflow can call it after the data pulls.
  workflow_call:
  # Editing this file fires a run — handy for triggering from mobile.
  push:
    paths:
      - .github/workflows/safety_compliance_email.yml
  schedule:
    # Same DST-proof pattern as the scorecard: arm both CDT and CST
    # 5am slots + ~1h of backups. The CT-gate step rejects slots that
    # land before 5am Central (off-season cron) and skip 6am (reserved
    # for healthcheck-style backups, matches scorecard convention).
    - cron: '0 10 * * *'    # 5am CDT primary / 4am CST (gated)
    - cron: '30 10 * * *'   # 5:30am CDT backup / 4:30am CST (gated)
    - cron: '0 11 * * *'    # 6am CDT (gated) / 5am CST primary
    - cron: '30 11 * * *'   # 6:30am CDT (gated) / 5:30am CST backup

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  safety_report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Gate to 5am CT or later (skip 6am)
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          if [ "$CT_HOUR" -lt 5 ]; then
            echo "Before 5am CT — skipping this slot."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          elif [ "$CT_HOUR" -eq 6 ]; then
            echo "6am CT slot reserved for healthcheck — skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "5am CT or 7am+ CT — proceeding."
          fi

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies for WeasyPrint
        if: steps.ct_gate.outputs.skip != '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 fonts-liberation

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Build and send Safety & Compliance Report
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          # Recipient routing (mirrors scorecard_email.yml pattern):
          #   dispatch/push with `recipients` input set → use that TO override
          #   dispatch/push with no input → jeff-only (quiet test send)
          #   scheduled cron → SAFETY_RECIPIENTS / SAFETY_CC_RECIPIENTS secrets
          #   last fallback → Audra TO + JB/Jeff CC (per owner approval
          #   2026-06-15; only Audra owns the brief, JB+Jeff stay informed)
          SAFETY_TO_EMAILS: ${{ inputs.recipients != '' && inputs.recipients || ((github.event_name == 'workflow_dispatch' || github.event_name == 'push') && secrets.ONEDRIVE_USER_UPN || secrets.SAFETY_RECIPIENTS || 'audra@xfreight.net') }}
          SAFETY_CC_EMAILS: ${{ ((github.event_name == 'workflow_dispatch' || github.event_name == 'push') && '') || secrets.SAFETY_CC_RECIPIENTS || 'jb@xfreight.net,jeff@xfreight.net' }}
          # Push-triggered runs (mobile escape hatch) bypass the same-day
          # marker so the on-demand resend actually sends. The
          # skip_idempotency dispatch input does the same on demand.
          SAFETY_SKIP_IDEMPOTENCY: ${{ (github.event_name == 'push' || inputs.skip_idempotency) && '1' || '' }}
        run: python -m src.safety_compliance_email

      - name: Post accountability items to Teams
        # Posts two separate MessageCards to the Safety and Compliance
        # Teams channel — Audra's action items first, then Jackson+Dan's.
        # Reads output/safety-accountability-{date}.json written by the
        # safety brief run above. Silent no-op if TEAMS_SAFETY_WEBHOOK
        # is not set.
        if: steps.ct_gate.outputs.skip != '1'
        env:
          TEAMS_SAFETY_WEBHOOK: ${{ secrets.TEAMS_SAFETY_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json, os, datetime, requests
          from pathlib import Path

          webhook = os.environ.get("TEAMS_SAFETY_WEBHOOK", "").strip()
          if not webhook:
              print("TEAMS_SAFETY_WEBHOOK not set — skipping Teams posts.")
              raise SystemExit(0)

          today = datetime.date.today()
          run_url = os.environ.get("RUN_URL", "")
          acc_path = Path(f"output/safety-accountability-{today.isoformat()}.json")
          if not acc_path.exists():
              print(f"Accountability JSON not found at {acc_path} — skipping.")
              raise SystemExit(0)

          data = json.loads(acc_path.read_text())

          SEV_EMOJI  = {"critical": "🔴", "high": "🟠", "medium": "🟡"}
          SEV_COLOR  = {"critical": "FF0000", "high": "FF8C00", "medium": "FFD700"}

          def _subject(item: dict) -> str:
              parts = [item.get("driver") or item.get("unit") or ""]
              parts = [p for p in parts if p]
              base  = (f"{', '.join(parts)} — " if parts else "") + item.get("detail", "")
              days  = item.get("days_open", 1)
              if days >= 3:
                  base += f"  ⚠️ Day {days} open — ESCALATED"
              elif days == 2:
                  base += f"  ↩ Day {days} open"
              return base

          def _card_color(items: list[dict]) -> str:
              for sev in ("critical", "high", "medium"):
                  if any(i.get("severity") == sev for i in items):
                      return SEV_COLOR[sev]
              return "00B050"

          def _facts(items: list[dict]) -> list[dict]:
              # Sort: most days open first, then by severity.
              sev_rank = {"critical": 0, "high": 1, "medium": 2}
              sorted_items = sorted(
                  items,
                  key=lambda i: (-i.get("days_open", 1),
                                 sev_rank.get(i.get("severity", "medium"), 2))
              )
              facts = []
              for item in sorted_items:
                  emoji = SEV_EMOJI.get(item.get("severity", "medium"), "🟡")
                  cat   = item.get("category", "")
                  name  = f"{emoji} {cat}"
                  val   = _subject(item) + f"\n→ {item.get('prompt', '')}"
                  facts.append({"name": name, "value": val})
              return facts

          def post_card(owner_label: str, items: list[dict]) -> None:
              if not items:
                  print(f"{owner_label}: no action items today — skipping post.")
                  return
              color     = _card_color(items)
              new_count = sum(1 for i in items if i.get("days_open", 1) == 1)
              cf_count  = sum(1 for i in items if i.get("days_open", 1) > 1)
              esc_count = sum(1 for i in items if i.get("days_open", 1) >= 3)
              parts = [f"{len(items)} action item(s)"]
              if cf_count:
                  parts.append(f"{cf_count} carried forward")
              if esc_count:
                  parts.append(f"⚠️ {esc_count} escalated (3+ days open)")
              subtitle = " · ".join(parts) + " — reply with action taken"
              payload = {
                  "@type":    "MessageCard",
                  "@context": "https://schema.org/extensions",
                  "themeColor": color,
                  "summary":  f"XFreight Safety Accountability — {today:%a %b %d} — {owner_label}",
                  "sections": [{
                      "activityTitle":    f"📋 {owner_label} — Safety Accountability | {today:%A, %B %d, %Y}",
                      "activitySubtitle": subtitle,
                      "facts": _facts(items),
                  }],
                  "potentialAction": [{
                      "@type": "OpenUri",
                      "name":  "View workflow run",
                      "targets": [{"os": "default", "uri": run_url}],
                  }] if run_url else [],
              }
              resp = requests.post(webhook, json=payload, timeout=30)
              print(f"{owner_label} card: HTTP {resp.status_code} ({len(items)} items)")
              if resp.status_code not in range(200, 300):
                  print(f"  Response: {resp.text[:300]}")

          post_card("AUDRA",         data.get("audra", []))
          post_card("JACKSON + DAN", data.get("ops",   []))
          PY

      - name: Notify on failure
        if: failure() && steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          SAFETY_TO_EMAILS: ${{ inputs.recipients != '' && inputs.recipients || ((github.event_name == 'workflow_dispatch' || github.event_name == 'push') && secrets.ONEDRIVE_USER_UPN || secrets.SAFETY_RECIPIENTS || 'audra@xfreight.net') }}
          SAFETY_CC_EMAILS: ${{ ((github.event_name == 'workflow_dispatch' || github.event_name == 'push') && '') || secrets.SAFETY_CC_RECIPIENTS || 'jb@xfreight.net,jeff@xfreight.net' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          from src.onedrive_upload import get_token
          from src.scorecard_email import send_email
          tok = get_token(
              os.environ["AZURE_TENANT_ID"],
              os.environ["AZURE_CLIENT_ID"],
              os.environ["AZURE_CLIENT_SECRET"],
          )
          to = [e.strip() for e in os.environ.get("SAFETY_TO_EMAILS", "jeff@xfreight.net").split(",") if e.strip()]
          cc = [e.strip() for e in os.environ.get("SAFETY_CC_EMAILS", "").split(",") if e.strip()]
          run = os.environ.get("RUN_URL", "")
          html = (
              f"<p>The Safety &amp; Compliance Report job <b>failed</b> &mdash; "
              f"today's report did not send.</p>"
              f"<p>Run log: <a href='{run}'>{run}</a></p>"
          )
          send_email(tok, os.environ["ONEDRIVE_USER_UPN"], to,
                     "⚠️ XFreight Safety & Compliance Report FAILED", html,
                     cc_emails=cc or None)
          PY
