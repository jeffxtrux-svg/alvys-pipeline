# Safety & Compliance Report — daily HTML brief at 5am CT focused on
# driver safety, HOS compliance, and vehicle inspection state. Reads
# Samsara_Master.xlsx from OneDrive (same source as the executive
# brief) and emails an HTML body + PDF attachment.
#
# Currently in test mode: SAFETY_TO_EMAILS defaults to jeff@xfreight.net
# only. Flip the default below to the wider standing list once the
# report has been reviewed and signed off.
#
# GitHub Secrets required (shared with the rest of the pipeline):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
# The Azure app needs Mail.Send (already used by the scorecard).

name: Safety & Compliance Report (5am CT)

on:
  workflow_dispatch:
    inputs:
      recipients:
        description: 'Comma-separated recipient override (default: jeff only while testing)'
        required: false
        default: ''
      skip_idempotency:
        description: "Set true to force-resend even if today's marker exists"
        type: boolean
        default: false
  # Reusable so a Refresh-All workflow can call it after the data pulls.
  workflow_call:
  # Editing this file fires a run — handy for triggering from mobile.
  push:
    paths:
      - .github/workflows/safety_compliance_email.yml
  schedule:
    # Same DST-proof pattern as the scorecard: arm both CDT and CST
    # 5am slots + ~1h of backups. The CT-gate step rejects slots that
    # land before 5am Central (off-season cron) and skip 6am (reserved
    # for healthcheck-style backups, matches scorecard convention).
    - cron: '0 10 * * *'    # 5am CDT primary / 4am CST (gated)
    - cron: '30 10 * * *'   # 5:30am CDT backup / 4:30am CST (gated)
    - cron: '0 11 * * *'    # 6am CDT (gated) / 5am CST primary
    - cron: '30 11 * * *'   # 6:30am CDT (gated) / 5:30am CST backup

permissions:
  contents: read

jobs:
  safety_report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Gate to 5am CT or later (skip 6am)
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          if [ "$CT_HOUR" -lt 5 ]; then
            echo "Before 5am CT — skipping this slot."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          elif [ "$CT_HOUR" -eq 6 ]; then
            echo "6am CT slot reserved for healthcheck — skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "5am CT or 7am+ CT — proceeding."
          fi

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies for WeasyPrint
        if: steps.ct_gate.outputs.skip != '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 fonts-liberation

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Build and send Safety & Compliance Report
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          # TEST MODE — recipients defaults to jeff only while the
          # report content is being iterated on. The 'recipients' input
          # on workflow_dispatch still overrides for previews.
          SAFETY_TO_EMAILS: ${{ inputs.recipients != '' && inputs.recipients || secrets.ONEDRIVE_USER_UPN }}
          # Push-triggered runs (mobile escape hatch) bypass the same-day
          # marker so the on-demand resend actually sends. The
          # skip_idempotency dispatch input does the same on demand.
          SAFETY_SKIP_IDEMPOTENCY: ${{ (github.event_name == 'push' || inputs.skip_idempotency) && '1' || '' }}
        run: python -m src.safety_compliance_email

      - name: Notify on failure
        if: failure() && steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          SAFETY_TO_EMAILS: ${{ inputs.recipients != '' && inputs.recipients || secrets.ONEDRIVE_USER_UPN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          from src.onedrive_upload import get_token
          from src.scorecard_email import send_email
          tok = get_token(
              os.environ["AZURE_TENANT_ID"],
              os.environ["AZURE_CLIENT_ID"],
              os.environ["AZURE_CLIENT_SECRET"],
          )
          to = [e.strip() for e in os.environ.get("SAFETY_TO_EMAILS", "jeff@xfreight.net").split(",") if e.strip()]
          run = os.environ.get("RUN_URL", "")
          html = (
              f"<p>The Safety &amp; Compliance Report job <b>failed</b> &mdash; "
              f"today's report did not send.</p>"
              f"<p>Run log: <a href='{run}'>{run}</a></p>"
          )
          send_email(tok, os.environ["ONEDRIVE_USER_UPN"], to,
                     "⚠️ XFreight Safety & Compliance Report FAILED", html)
          PY
