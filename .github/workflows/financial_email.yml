# Financial Brief — daily HTML brief at 7am CT focused on Audra's
# invoicing / closeout / AR-reconciliation responsibilities. Split off
# from the Safety & Compliance Brief so each report stays scoped to
# one cognitive mode: safety = vigilance (5am, scan-and-triage),
# financial = batch admin (7am, after desk work starts).
#
# Reads Alvys Pipeline.xlsx + QB_AgedReceivableDetail.xlsx + QB_Bills.xlsx
# from OneDrive and emails an HTML body + PDF attachment.
#
# Currently in test mode: FINANCIAL_TO_EMAILS defaults to jeff@xfreight.net
# only. Flip the default below to the wider standing list once the
# report has been reviewed and signed off.
#
# GitHub Secrets required (shared with the rest of the pipeline):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET

name: Financial Brief (7am CT)

on:
  workflow_dispatch:
    inputs:
      recipients:
        description: 'Comma-separated recipient override (default: jeff only while testing)'
        required: false
        default: ''
      skip_idempotency:
        description: "Set true to force-resend even if today's marker exists"
        type: boolean
        default: false
  workflow_call:
  # Editing this file fires a run — handy for triggering from mobile.
  push:
    paths:
      - .github/workflows/financial_email.yml
  schedule:
    # DST-proof: arm both CDT and CST 7am slots + ~1h of backups. The
    # CT-gate step rejects slots that land before 7am Central.
    - cron: '0 12 * * *'    # 7am CDT primary / 6am CST (gated)
    - cron: '30 12 * * *'   # 7:30am CDT backup / 6:30am CST (gated)
    - cron: '0 13 * * *'    # 8am CDT (gated) / 7am CST primary
    - cron: '30 13 * * *'   # 8:30am CDT (gated) / 7:30am CST backup

permissions:
  contents: read

jobs:
  financial_report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Gate to 7am CT or later (skip 8am)
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          if [ "$CT_HOUR" -lt 7 ]; then
            echo "Before 7am CT — skipping this slot."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          elif [ "$CT_HOUR" -eq 8 ]; then
            echo "8am CT slot reserved for healthcheck — skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "7am CT or 9am+ CT — proceeding."
          fi

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies for WeasyPrint
        if: steps.ct_gate.outputs.skip != '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 fonts-liberation

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Build and send Financial Brief
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          # TEST MODE: jeff-only on every trigger (scheduled, push,
          # dispatch). The production routing is Audra primary + Jeff/JB
          # cc, but the flip to that audience is on hold pending
          # explicit owner approval. Until then ONEDRIVE_USER_UPN
          # (jeff@xfreight.net) is the only recipient. A dispatch with
          # the `recipients` input still overrides for one-shot previews.
          FINANCIAL_TO_EMAILS: ${{ inputs.recipients != '' && inputs.recipients || secrets.ONEDRIVE_USER_UPN }}
          # Push-triggered runs (mobile escape hatch) bypass the same-day
          # marker so the on-demand resend actually sends. The
          # skip_idempotency dispatch input does the same on demand.
          FINANCIAL_SKIP_IDEMPOTENCY: ${{ (github.event_name == 'push' || inputs.skip_idempotency) && '1' || '' }}
        run: python -m src.financial_email

      - name: Notify on failure
        if: failure() && steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          FINANCIAL_TO_EMAILS: ${{ inputs.recipients != '' && inputs.recipients || secrets.ONEDRIVE_USER_UPN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          from src.onedrive_upload import get_token
          from src.scorecard_email import send_email
          tok = get_token(
              os.environ["AZURE_TENANT_ID"],
              os.environ["AZURE_CLIENT_ID"],
              os.environ["AZURE_CLIENT_SECRET"],
          )
          to = [e.strip() for e in os.environ.get("FINANCIAL_TO_EMAILS", "jeff@xfreight.net").split(",") if e.strip()]
          run = os.environ.get("RUN_URL", "")
          html = (
              f"<p>The Financial Brief job <b>failed</b> &mdash; "
              f"today's report did not send.</p>"
              f"<p>Run log: <a href='{run}'>{run}</a></p>"
          )
          send_email(tok, os.environ["ONEDRIVE_USER_UPN"], to,
                     "⚠️ XFreight Financial Brief FAILED", html)
          PY
