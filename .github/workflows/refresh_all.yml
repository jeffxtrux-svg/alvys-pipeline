# Refresh All Sources (and optional scorecard email).
#
# Manual one-click trigger that fans out to Alvys, Samsara, QuickBooks, and
# SambaSafety in parallel, then optionally sends the executive brief once
# all four refreshes finish.
#
# Use this from the Actions tab when you need the dashboard data refreshed
# on demand (e.g., to test a new mapping, after fixing a column, or when
# the morning cron dropped). Each child workflow inherits its own secrets,
# env vars, and timeouts from its existing definition — this file is just
# the orchestrator.
#
# The four refresh jobs run in parallel (independent OneDrive folders, no
# contention). The scorecard waits for all four to finish AND succeed.

name: Refresh All Sources (dashboard)

on:
  workflow_dispatch:
    inputs:
      include_scorecard:
        description: 'Send the scorecard email after refreshes complete (true/false)'
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'
  # Editing this file fires a full refresh on push — an on-demand escape hatch
  # for when the Actions "Run workflow" button isn't handy. include_scorecard is
  # unset on push, so the scorecard child uses its default (sends), to Jeff only.
  push:
    paths:
      - .github/workflows/refresh_all.yml
  # trigger: 2026-06-13 — one-shot full refresh (clears the QB-only past-due
  # orphans now that they're invoiced) + deliver the brief with the finished
  # Data Refresh Status page (10 sources, API labels).

jobs:
  alvys:
    name: Alvys
    uses: ./.github/workflows/refresh.yml
    secrets: inherit

  samsara:
    name: Samsara
    uses: ./.github/workflows/samsara_refresh.yml
    secrets: inherit

  quickbooks:
    name: QuickBooks
    uses: ./.github/workflows/qb_refresh.yml
    secrets: inherit

  sambasafety:
    name: SambaSafety
    uses: ./.github/workflows/sambasafety_refresh.yml
    secrets: inherit

  scorecard:
    name: Scorecard email
    needs: [alvys, samsara, quickbooks, sambasafety]
    if: inputs.include_scorecard != 'false'
    # scorecard_email.yml requests contents: write (it commits the Karpathy-Wiki
    # archive). A called workflow can't request more than the caller grants, and
    # this caller job otherwise defaults to contents: read — so grant write here.
    permissions:
      contents: write
    uses: ./.github/workflows/scorecard_email.yml
    secrets: inherit
