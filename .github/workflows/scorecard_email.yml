# Daily KPI scorecard email — reads the latest pipeline outputs from OneDrive,
# computes the key metrics + executive overview, and emails them.
#
# Reads only (no API pulls) so it never touches the QuickBooks token rotation.
# Runs after the morning data refresh.
#
# GitHub Secrets required (shared with the rest of the pipeline):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
# The Azure app needs Mail.Send (already used by the Samsara alert job).

name: Daily KPI Scorecard Email

on:
  workflow_dispatch:
  # One-shot verification trigger — DELETE this push block after the run finishes.
  # (touch bump: render Idle Gal column from OBD fuel-counter integration)
  push:
    branches:
      - claude/claude-md-docs-Es64x
    paths:
      - .github/workflows/scorecard_email.yml
  schedule:
    # Two cron entries, 15 min apart, as redundancy against GitHub Actions
    # schedule drops. GitHub's cron is documented as best-effort — runs at
    # high-traffic minutes get silently dropped or delayed. If 5:30am CST
    # (11:30 UTC) drops, the 5:45am CST (11:45 UTC) backup still produces
    # the brief 15 minutes later. The script is idempotent (reads the
    # latest OneDrive files each run) so on a normal day BOTH may fire and
    # the team gets two identical briefs — a small annoyance well worth
    # the silent-miss insurance.
    #
    # Both line up after the 5:00am Alvys/Samsara/QB refresh so all three
    # feeds are fresh in OneDrive. GitHub cron is fixed UTC and ignores
    # DST, so during Central Daylight Time these land at 6:30am / 6:45am.
    - cron: '30 11 * * *'   # primary    5:30am CST / 6:30am CDT
    - cron: '45 11 * * *'   # backup     5:45am CST / 6:45am CDT

permissions:
  contents: write

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build and send scorecard
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          SCORECARD_TO_EMAILS: jeff@xfreight.net
          # Read the exact workbook the Power BI report uses, by its OneDrive sharing
          # URL — there is a second file of the same name, so reading by name picked
          # the wrong (un-settled) one. The sharing URL resolves to the right item.
          SCORECARD_ALVYS_SHARE_URL: "https://xfreightnet-my.sharepoint.com/:x:/g/personal/jeff_xfreight_net/IQCS8VN_Oxb9S7p2e4lYfePXAetRrCNH351gIGbZ5c53J1U"
          SCORECARD_ALVYS_PATH: "Alvys Master 2026.xlsx"
        run: python -m src.scorecard_email

      - name: Commit Karpathy-Wiki archive
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if ! git status --porcelain Karpathy-Wiki/raw 2>/dev/null | grep -q .; then
            echo "No Karpathy-Wiki updates from this run."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="${GITHUB_REF_NAME}"
          git add Karpathy-Wiki/raw
          git commit -m "data: ${{ github.workflow }} $(date -u +%Y-%m-%dT%H:%M)"
          for delay in 1 2 4 8 16; do
            git fetch origin "$BRANCH" 2>/dev/null || true
            git rebase "origin/$BRANCH" 2>/dev/null || { git rebase --abort 2>/dev/null || true; }
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            echo "Push conflicted, retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "Failed to push after retries"; exit 1

      # If the brief fails to build/send, the morning email would just silently
      # not arrive. Send a short failure notice (reuses the same Graph Mail.Send
      # path + secrets) so a broken run is noticed instead of going quiet.
      - name: Notify on failure
        if: failure()
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          SCORECARD_TO_EMAILS: jeff@xfreight.net
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          from src.onedrive_upload import get_token
          from src.scorecard_email import send_email
          tok = get_token(os.environ["AZURE_TENANT_ID"], os.environ["AZURE_CLIENT_ID"], os.environ["AZURE_CLIENT_SECRET"])
          to = [e.strip() for e in os.environ.get("SCORECARD_TO_EMAILS", "jeff@xfreight.net").split(",") if e.strip()]
          run = os.environ.get("RUN_URL", "")
          html = (f"<p>The daily KPI scorecard job <b>failed</b> &mdash; this morning's brief was not sent.</p>"
                  f"<p>Check the run log: <a href='{run}'>{run}</a></p>")
          send_email(tok, os.environ["ONEDRIVE_USER_UPN"], to, "⚠️ XFreight scorecard email FAILED", html)
          PY
