# Daily KPI scorecard email — reads the latest pipeline outputs from OneDrive,
# computes the key metrics + executive overview, and emails them.
# trigger: relax page-break-inside so data tables can split, filling pages.
# trigger: re-run scorecard on demand.
# trigger: PDF-only email body.
# trigger: data-table rows can split across pages.
# trigger: shift crons 1hr earlier for 5:30am CDT delivery.
# trigger: pin office overhead/mi to $0.92 while costing algorithm catches up.
# trigger: manual fire for 2026-06-06 — all 6 scheduled slots dropped.
#
# Reads only (no API pulls) so it never touches the QuickBooks token rotation.
# Runs after the morning data refresh.
#
# GitHub Secrets required (shared with the rest of the pipeline):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
# The Azure app needs Mail.Send (already used by the Samsara alert job).

name: Daily KPI Scorecard Email

on:
  workflow_dispatch:
  # Reusable so the "Refresh All" workflow can call it after the four
  # source refreshes succeed. The script bypasses its "sent today" marker
  # whenever GITHUB_EVENT_NAME is workflow_dispatch, including when called
  # via workflow_call from a manual Refresh All run.
  workflow_call:
  # Editing this file fires the workflow on push — handy for triggering a
  # run from mobile when the Actions UI's "Run workflow" button isn't
  # reachable. The job step below sets SCORECARD_SKIP_IDEMPOTENCY=1 for
  # push events so the same-day marker is bypassed and the run actually
  # emails.
  push:
    paths:
      - .github/workflows/scorecard_email.yml
  schedule:
    # Defense in depth against GitHub Actions schedule drops — GitHub's cron
    # is documented as best-effort, and during high load runs are silently
    # dropped (e.g. 2026-06-02 lost both the 11:30 and 11:45 UTC triggers).
    # We arm five staggered attempts; the scorecard script itself checks a
    # "sent today" marker in OneDrive at startup and exits clean if today's
    # brief already landed, so only the first cron that fires actually
    # emails — the rest exit in seconds. Manual workflow_dispatch bypasses
    # the marker check.
    #
    # GitHub cron is fixed UTC and ignores DST. Target: 5:00am Central
    # year-round, in both CDT (mid-Mar → early Nov) and CST (early Nov →
    # mid-Mar). We arm both the CDT 5am slot (10 UTC) and the CST 5am slot
    # (11 UTC), plus ~1h of backup retries in each. The "Gate to 5am CT or
    # later" step at the top of the job rejects the slots that map to
    # BEFORE 5am Central in the current season (so the CDT-shaped slots
    # don't send an hour early in winter), and the script's same-day
    # idempotency marker makes sure only the first un-gated slot emails.
    - cron: '0 10 * * *'    # 5:00am CDT  primary  / 4:00am CST  (skipped by gate)
    - cron: '15 10 * * *'   # 5:15am CDT  backup 1 / 4:15am CST  (skipped by gate)
    - cron: '30 10 * * *'   # 5:30am CDT  backup 2 / 4:30am CST  (skipped by gate)
    - cron: '0 11 * * *'    # 6:00am CDT  backup 3 / 5:00am CST  primary
    - cron: '30 11 * * *'   # 6:30am CDT  last     / 5:30am CST  backup 1
    - cron: '0 12 * * *'    # 7:00am CDT  (none)   / 6:00am CST  last resort

permissions:
  contents: write

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Gate to 5am CT or later
        # Cron is fixed UTC, so the 10 UTC slots map to 5am CDT in summer
        # but only 4am CST in winter. Skip the run when Central time hasn't
        # reached 5am yet — the next 11 UTC slot will pick it up at 5am CST.
        # Manual / workflow_call / push runs bypass the gate so on-demand
        # triggers always work regardless of the time of day.
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          if [ "$CT_HOUR" -lt 5 ]; then
            echo "Before 5am CT — skipping this slot."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "5am CT or later — proceeding."
          fi

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies for WeasyPrint
        if: steps.ct_gate.outputs.skip != '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 fonts-liberation

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Build and send scorecard
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          SCORECARD_TO_EMAILS: jeff@xfreight.net,jb@xfreight.net
          # Push-triggered runs (mobile escape hatch) bypass the same-day
          # idempotency marker so the on-demand resend actually sends.
          # Empty string for cron/dispatch leaves the marker check in force.
          SCORECARD_SKIP_IDEMPOTENCY: ${{ github.event_name == 'push' && '1' || '' }}
          # Read the exact workbook the Power BI report uses, by its OneDrive sharing
          # URL — there is a second file of the same name, so reading by name picked
          # the wrong (un-settled) one. The sharing URL resolves to the right item.
          SCORECARD_ALVYS_SHARE_URL: "https://xfreightnet-my.sharepoint.com/:x:/g/personal/jeff_xfreight_net/IQCS8VN_Oxb9S7p2e4lYfePXAetRrCNH351gIGbZ5c53J1U"
          SCORECARD_ALVYS_PATH: "Alvys Master 2026.xlsx"
        run: python -m src.scorecard_email

      - name: Commit Karpathy-Wiki archive
        if: always() && steps.ct_gate.outputs.skip != '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if ! git status --porcelain Karpathy-Wiki/raw 2>/dev/null | grep -q .; then
            echo "No Karpathy-Wiki updates from this run."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="${GITHUB_REF_NAME}"
          git add Karpathy-Wiki/raw
          git commit -m "data: ${{ github.workflow }} $(date -u +%Y-%m-%dT%H:%M)"
          for delay in 1 2 4 8 16; do
            git fetch origin "$BRANCH" 2>/dev/null || true
            git rebase "origin/$BRANCH" 2>/dev/null || { git rebase --abort 2>/dev/null || true; }
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            echo "Push conflicted, retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "Failed to push after retries"; exit 1

      # If the brief fails to build/send, the morning email would just silently
      # not arrive. Send a short failure notice (reuses the same Graph Mail.Send
      # path + secrets) so a broken run is noticed instead of going quiet.
      - name: Notify on failure
        if: failure()
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          SCORECARD_TO_EMAILS: jeff@xfreight.net,jb@xfreight.net
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          from src.onedrive_upload import get_token
          from src.scorecard_email import send_email
          tok = get_token(os.environ["AZURE_TENANT_ID"], os.environ["AZURE_CLIENT_ID"], os.environ["AZURE_CLIENT_SECRET"])
          to = [e.strip() for e in os.environ.get("SCORECARD_TO_EMAILS", "jeff@xfreight.net").split(",") if e.strip()]
          run = os.environ.get("RUN_URL", "")
          html = (f"<p>The daily KPI scorecard job <b>failed</b> &mdash; this morning's brief was not sent.</p>"
                  f"<p>Check the run log: <a href='{run}'>{run}</a></p>")
          send_email(tok, os.environ["ONEDRIVE_USER_UPN"], to, "⚠️ XFreight scorecard email FAILED", html)
          PY
