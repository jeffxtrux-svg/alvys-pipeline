# Daily KPI scorecard email — reads the latest pipeline outputs from OneDrive,
# computes the key metrics + executive overview, and emails them.
# trigger: relax page-break-inside so data tables can split, filling pages.
# trigger: re-run scorecard on demand.
# trigger: PDF-only email body.
# trigger: data-table rows can split across pages.
# trigger: shift crons 1hr earlier for 5:30am CDT delivery.
# trigger: pin office overhead/mi to $0.92 while costing algorithm catches up.
# trigger: manual fire for 2026-06-06 — all 6 scheduled slots dropped.
# trigger: 2026-06-07 — re-fire after restoring 9 scorecard fixes that were
# lost when the karpathy branch was force-pushed (coaching ack from
# SafetyEvents, BL speed key, RPM chart/tile parity, MTD idle gallons, etc.).
# trigger: 2026-06-13 — one-shot to Jeff after the X-Trux Corrected Margin %
# (>= 80%) hold-out rule; X-Trux should read ~$225,078.85.
# trigger: 2026-06-13 — re-fire after lowering the X-Trux hold-out to >= 74%
# (catches Valley Play at 75.51%); X-Trux should read ~$222,915.89.
#
# Reads only (no API pulls) so it never touches the QuickBooks token rotation.
# Runs after the morning data refresh.
#
# GitHub Secrets required (shared with the rest of the pipeline):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
# The Azure app needs Mail.Send (already used by the Samsara alert job).

name: Daily KPI Scorecard Email

on:
  workflow_dispatch:
    inputs:
      recipients:
        description: 'Comma-separated email override (default: standing list jeff+jb). Use for one-shot sends to a single address.'
        required: false
        default: ''
  # Reusable so the "Refresh All" workflow can call it after the four
  # source refreshes succeed. The script bypasses its "sent today" marker
  # whenever GITHUB_EVENT_NAME is workflow_dispatch, including when called
  # via workflow_call from a manual Refresh All run.
  # `recipients` MUST be declared here too: the job env references
  # inputs.recipients, and a reusable workflow is invalid (startup failure when
  # called) if it references an input not declared under workflow_call.
  workflow_call:
    inputs:
      recipients:
        description: 'Comma-separated recipient override; empty = on-demand default (jeff only).'
        required: false
        type: string
        default: ''
  # Editing this file fires the workflow on push — handy for triggering a
  # run from mobile when the Actions UI's "Run workflow" button isn't
  # reachable. The job step below sets SCORECARD_SKIP_IDEMPOTENCY=1 for
  # push events so the same-day marker is bypassed and the run actually
  # emails.
  push:
    paths:
      - .github/workflows/scorecard_email.yml
  # trigger: 2026-06-13c — Equipment Compliance page: inspection Days stay
  # neutral (normal color) until actually past due — red only for overdue, no
  # amber on upcoming dates (tractors + trailers). Tractor page also shows
  # current mileage (live Samsara OBD odometer), last oil change date (from the
  # Alvys Maintenance tab), and an estimated next-oil-due mileage (current
  # odometer → next 25k mark, "est" until Alvys logs the odometer at each oil
  # change).
  schedule:
    # Defense in depth against GitHub Actions schedule drops — GitHub's cron
    # is documented as best-effort, and during high load runs are silently
    # dropped (e.g. 2026-06-02 lost both the 11:30 and 11:45 UTC triggers).
    # We arm staggered attempts; the scorecard script checks a "sent today"
    # marker in OneDrive at startup and exits clean if today's brief already
    # landed, so only the first slot that fires actually emails.
    #
    # Target: 4:45am Central year-round — 45 min after the 4am data pull,
    # giving Alvys/Samsara/QB time to complete before the brief reads them.
    # Gate uses total-minutes since midnight (285 = 4h45m) so it works at
    # sub-hour precision for both CDT and CST.
    - cron: '45 9 * * *'    # 4:45am CDT  primary  / 3:45am CST  (gated)
    - cron: '0 10 * * *'    # 5:00am CDT  backup 1 / 4:00am CST  (gated)
    - cron: '15 10 * * *'   # 5:15am CDT  backup 2 / 4:15am CST  (gated)
    - cron: '45 10 * * *'   # 5:45am CDT  backup 3 / 4:45am CST  primary
    - cron: '15 11 * * *'   # 6:15am CDT  backup 4 / 5:15am CST  backup 1
    - cron: '45 11 * * *'   # 6:45am CDT  last     / 5:45am CST  backup 2
    - cron: '0 12 * * *'    # 7:00am CDT  (none)   / 6:00am CST  last resort

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Gate to 4:45am CT or later (skip 6am)
        # Uses total-minutes since midnight for sub-hour precision.
        # 285 = 4*60+45 = 4:45am. Skip before 4:45am (CDT-shaped crons that
        # fire at 3:45am–4:30am CST are gated here). Also skip 6am CT: the
        # scorecard healthcheck fires then and would collide on drop mornings.
        # Manual / workflow_call / push runs bypass so on-demand triggers
        # always work regardless of time.
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          CT_MIN=$(TZ=America/Chicago date +%-M)
          CT_TOTAL=$(( CT_HOUR * 60 + CT_MIN ))
          echo "Central time: ${CT_HOUR}:$(printf '%02d' $CT_MIN) (${CT_TOTAL} mins)"
          if [ "$CT_TOTAL" -lt 285 ]; then
            echo "Before 4:45am CT — skipping this slot."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          elif [ "$CT_HOUR" -eq 6 ]; then
            echo "6am CT reserved for healthcheck — skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "4:45am CT or later — proceeding."
          fi

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies for WeasyPrint
        if: steps.ct_gate.outputs.skip != '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 fonts-liberation

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Build and send scorecard
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          # Recipient policy:
          #   workflow_dispatch / push with empty recipients input → jeff only
          #     (manual + mobile-escape-hatch sends default to a quiet
          #     single-mailbox test send so a verification run doesn't fan out
          #     to the whole team).
          #   workflow_dispatch with recipients input set    → that list.
          #   scheduled / workflow_call → the standing list (jeff + jb).
          # Final `||` fallback hardcodes Dan + JB + Jeff so the standing
          # list survives even if the SCORECARD_RECIPIENTS secret is unset.
          SCORECARD_TO_EMAILS: ${{ inputs.recipients != '' && inputs.recipients || ((github.event_name == 'workflow_dispatch' || github.event_name == 'push') && secrets.ONEDRIVE_USER_UPN || secrets.SCORECARD_RECIPIENTS || 'jeff@xfreight.net,jb@xfreight.net,dan@xfreight.net') }}
          # Push and manual dispatch bypass the same-day idempotency marker so
          # on-demand re-sends always fire. Cron slots leave the marker in force
          # so only the first scheduled slot each day actually emails.
          SCORECARD_SKIP_IDEMPOTENCY: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && '1' || '' }}
          # Read the EXACT workbook the Power BI report uses, by its OneDrive
          # sharing URL (resolves the specific item, immune to duplicate names).
          # The ALVYS_SHARE_URL secret points at the correct no-space
          # "Alvys Master2026.xlsx" (3 tabs Fuel/Loads/Trips, re-uploaded every
          # afternoon) — verified 2026-06-13 that this read reproduces the PBI
          # numbers to the penny. The fallback name below is the same no-space
          # file; the WITH-space "Alvys Master 2026.xlsx" is a different workbook
          # and must NOT be used.
          SCORECARD_ALVYS_SHARE_URL: ${{ secrets.ALVYS_SHARE_URL }}
          SCORECARD_ALVYS_PATH: "Alvys Master2026.xlsx"
          # Read-only token for the brief's final "Data refresh status" page, which
          # queries the GitHub Actions API for each refresh workflow's latest run.
          # Reuses the GH_PAT already used by the upload-status digest. Fail-soft:
          # if absent, the run column just shows blanks.
          GH_TOKEN: ${{ secrets.GH_PAT }}
          # Power BI XFreight Report last-refresh row on that page. Needs the Azure
          # app granted Power BI API access (service principal added to the
          # workspace) plus these IDs. Until both secrets are set, the row reads
          # "not configured" and everything else is unaffected. Uses the AZURE_*
          # creds above for the Power BI token.
          PBI_WORKSPACE_ID: ${{ secrets.PBI_WORKSPACE_ID }}
          PBI_DATASET_ID: ${{ secrets.PBI_DATASET_ID }}
        run: python -m src.scorecard_email

      - name: Commit Karpathy-Wiki archive
        if: always() && steps.ct_gate.outputs.skip != '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if ! git status --porcelain Karpathy-Wiki/raw 2>/dev/null | grep -q .; then
            echo "No Karpathy-Wiki updates from this run."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="${GITHUB_REF_NAME}"
          git add Karpathy-Wiki/raw
          git commit -m "data: ${{ github.workflow }} $(date -u +%Y-%m-%dT%H:%M)"
          for delay in 1 2 4 8 16; do
            git fetch origin "$BRANCH" 2>/dev/null || true
            git rebase "origin/$BRANCH" 2>/dev/null || { git rebase --abort 2>/dev/null || true; }
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            echo "Push conflicted, retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "Failed to push after retries"; exit 1

      # If the brief fails to build/send, the morning email would just silently
      # not arrive. Send a short failure notice (reuses the same Graph Mail.Send
      # path + secrets) so a broken run is noticed instead of going quiet.
      - name: Notify on failure
        if: failure()
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          # Mirror the send step's recipient policy so a one-shot dispatch
          # to a single mailbox doesn't fan its failure notice out.
          # Final `||` fallback hardcodes Dan + JB + Jeff so the standing
          # list survives even if the SCORECARD_RECIPIENTS secret is unset.
          SCORECARD_TO_EMAILS: ${{ inputs.recipients != '' && inputs.recipients || ((github.event_name == 'workflow_dispatch' || github.event_name == 'push') && secrets.ONEDRIVE_USER_UPN || secrets.SCORECARD_RECIPIENTS || 'jeff@xfreight.net,jb@xfreight.net,dan@xfreight.net') }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          from src.onedrive_upload import get_token
          from src.scorecard_email import send_email
          tok = get_token(os.environ["AZURE_TENANT_ID"], os.environ["AZURE_CLIENT_ID"], os.environ["AZURE_CLIENT_SECRET"])
          to = [e.strip() for e in os.environ.get("SCORECARD_TO_EMAILS", "jeff@xfreight.net").split(",") if e.strip()]
          run = os.environ.get("RUN_URL", "")
          html = (f"<p>The daily KPI scorecard job <b>failed</b> &mdash; this morning's brief was not sent.</p>"
                  f"<p>Check the run log: <a href='{run}'>{run}</a></p>")
          send_email(tok, os.environ["ONEDRIVE_USER_UPN"], to, "⚠️ XFreight scorecard email FAILED", html)
          PY
