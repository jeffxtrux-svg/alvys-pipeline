# Monthly credential expiry monitor — runs on the 1st of each month at 8am CT.
#
# Why this matters
# ----------------
# Two credentials are silent single points of failure for the entire pipeline:
#
#   AZURE_CLIENT_SECRET  — used by every workflow that touches OneDrive (safety
#     brief, Teams cards, healthchecks, scorecard, daily upload). When it
#     expires, ALL of them fail at once with no warning.
#
#   GH_PAT  — used by the safety and scorecard healthchecks to re-fire the
#     brief when GitHub drops a morning cron slot. When it expires the
#     healthcheck runs but can't recover the missed send.
#
# This job runs on the 1st of each month, attempts to auto-detect both expiry
# dates, and sends a warning email when either is within 90 days (critical at
# 30 days).
#
# Auto-detection
# --------------
#   Azure secret: queries Graph API for the app's passwordCredentials. Requires
#     Application.Read.All on the service principal. If that permission is
#     absent (403), falls back to the AZURE_SECRET_EXPIRES Actions variable.
#   GH_PAT: GitHub's API doesn't expose PAT expiry to the token itself, so
#     this always falls back to the GH_PAT_EXPIRES Actions variable.
#
# One-time setup (do this now)
# ----------------------------
# In the repo → Settings → Variables → Actions (these are variables, not secrets):
#
#   AZURE_SECRET_EXPIRES   ISO date when AZURE_CLIENT_SECRET expires
#                          e.g. 2027-06-15
#                          Find it: Azure Portal → App Registrations →
#                          [your app] → Certificates & secrets
#
#   GH_PAT_EXPIRES         ISO date when GH_PAT expires
#                          e.g. 2026-12-01
#                          Find it: GitHub → Settings → Developer settings →
#                          Personal access tokens → Fine-grained tokens
#
# Renewal instructions are included in the warning email itself.
#
# Required secrets (shared with the rest of the pipeline):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, ONEDRIVE_USER_UPN
# Optional secret for routing (falls back to jeff@xfreight.net):
#   ADMIN_EMAILS   — comma-separated list of addresses for infra alerts

name: Credential expiry check (monthly)

on:
  workflow_dispatch:
  schedule:
    # 8am CT on the 1st of each month — CDT (UTC-5) and CST (UTC-6) slots.
    - cron: '0 13 1 * *'   # 8am CDT
    - cron: '0 14 1 * *'   # 8am CST

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check_expiry:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Gate to 8am CT on the 1st
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          CT_DAY=$(TZ=America/Chicago date +%-d)
          echo "Central time: day=$CT_DAY hour=$CT_HOUR"
          if [ "$CT_DAY" -ne 1 ]; then
            echo "Not the 1st — skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          elif [ "$CT_HOUR" -ne 8 ]; then
            echo "Not 8am CT — skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "1st of month, 8am CT — proceeding."
          fi

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install msal requests python-dotenv

      - name: Check credential expiry and alert
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN:    ${{ secrets.ONEDRIVE_USER_UPN }}
          # Optional stored expiry dates (Actions variables, not secrets)
          AZURE_SECRET_EXPIRES: ${{ vars.AZURE_SECRET_EXPIRES || '' }}
          GH_PAT_EXPIRES:       ${{ vars.GH_PAT_EXPIRES || '' }}
          # Alert routing — infra alerts go to Jeff; fallback hardcoded
          ADMIN_EMAILS:         ${{ secrets.ADMIN_EMAILS || 'jeff@xfreight.net' }}
        run: |
          python - <<'PY'
          import datetime
          import os
          import sys
          from zoneinfo import ZoneInfo

          sys.path.insert(0, ".")
          from src.onedrive_upload import get_token
          from src.scorecard_email import send_email

          import msal
          import requests

          WARN_DAYS     = 90
          CRITICAL_DAYS = 30

          today     = datetime.datetime.now(ZoneInfo("America/Chicago")).date()
          tenant    = os.environ["AZURE_TENANT_ID"]
          client_id = os.environ["AZURE_CLIENT_ID"]
          secret    = os.environ["AZURE_CLIENT_SECRET"]
          upn       = os.environ["ONEDRIVE_USER_UPN"]

          # ------------------------------------------------------------------
          # Acquire a Graph token for both the expiry check and the email send
          # ------------------------------------------------------------------
          def _graph_token():
              app = msal.ConfidentialClientApplication(
                  client_id, client_credential=secret,
                  authority=f"https://login.microsoftonline.com/{tenant}",
              )
              r = app.acquire_token_for_client(
                  scopes=["https://graph.microsoft.com/.default"])
              return r.get("access_token")

          graph_tok = _graph_token()
          findings  = []   # list of (label, expiry_date, days_left)

          # ------------------------------------------------------------------
          # 1. Azure client secret — try Graph API, fall back to stored var
          # ------------------------------------------------------------------
          azure_expiry = None
          try:
              resp = requests.get(
                  "https://graph.microsoft.com/v1.0/applications"
                  f"?$filter=appId eq '{client_id}'"
                  "&$select=displayName,passwordCredentials",
                  headers={"Authorization": f"Bearer {graph_tok}"},
                  timeout=15,
              )
              if resp.status_code == 200:
                  apps = resp.json().get("value", [])
                  if apps:
                      creds = apps[0].get("passwordCredentials", [])
                      expiries = []
                      for c in creds:
                          end = c.get("endDateTime")
                          if end:
                              try:
                                  d = datetime.datetime.fromisoformat(
                                      end.replace("Z", "+00:00")).date()
                                  expiries.append((d, c.get("displayName", "secret")))
                              except Exception:
                                  pass
                      if expiries:
                          expiries.sort()
                          azure_expiry, name = expiries[0]
                          print(f"Graph API: Azure secret '{name}' expires {azure_expiry}")
              elif resp.status_code == 403:
                  print("Graph API: Application.Read.All not granted — using stored date.")
              else:
                  print(f"Graph API returned {resp.status_code} — using stored date.")
          except Exception as exc:
              print(f"Graph API error: {exc} — using stored date.")

          if azure_expiry is None:
              stored = os.environ.get("AZURE_SECRET_EXPIRES", "").strip()
              if stored:
                  try:
                      azure_expiry = datetime.date.fromisoformat(stored)
                      print(f"Using stored AZURE_SECRET_EXPIRES: {azure_expiry}")
                  except Exception:
                      print(f"WARNING: AZURE_SECRET_EXPIRES='{stored}' is not a valid ISO date.")
              else:
                  print("WARNING: Could not auto-detect Azure secret expiry and "
                        "AZURE_SECRET_EXPIRES variable is not set. "
                        "Set it in repo Settings → Variables → Actions.")

          if azure_expiry:
              days = (azure_expiry - today).days
              findings.append(("Azure Client Secret (AZURE_CLIENT_SECRET)", azure_expiry, days))

          # ------------------------------------------------------------------
          # 2. GH_PAT — always stored date (GitHub API doesn't expose PAT expiry)
          # ------------------------------------------------------------------
          gh_stored = os.environ.get("GH_PAT_EXPIRES", "").strip()
          if gh_stored:
              try:
                  gh_expiry = datetime.date.fromisoformat(gh_stored)
                  days = (gh_expiry - today).days
                  findings.append(("GitHub PAT (GH_PAT)", gh_expiry, days))
                  print(f"GH_PAT expires {gh_expiry} ({days} days)")
              except Exception:
                  print(f"WARNING: GH_PAT_EXPIRES='{gh_stored}' is not a valid ISO date.")
          else:
              print("Note: GH_PAT_EXPIRES variable not set — PAT expiry not checked. "
                    "Set it in repo Settings → Variables → Actions.")

          # ------------------------------------------------------------------
          # Filter to within WARN_DAYS and build email
          # ------------------------------------------------------------------
          alerts = [(lbl, exp, d) for lbl, exp, d in findings if d <= WARN_DAYS]

          if not alerts:
              print(f"All credentials OK — nothing expiring within {WARN_DAYS} days.")
              sys.exit(0)

          any_critical = any(d <= CRITICAL_DAYS for _, _, d in alerts)

          rows = ""
          for lbl, exp, days in alerts:
              crit   = days <= CRITICAL_DAYS
              color  = "#B01C2E" if crit else "#B8860B"
              badge  = "🔴 CRITICAL" if crit else "⚠️ WARNING"
              rows += (
                  f"<tr>"
                  f"<td style='padding:10px 12px;border-bottom:1px solid #eee;"
                  f"font-weight:600;'>{lbl}</td>"
                  f"<td style='padding:10px 12px;border-bottom:1px solid #eee;'>"
                  f"{exp.strftime('%B %d, %Y')}</td>"
                  f"<td style='padding:10px 12px;border-bottom:1px solid #eee;"
                  f"color:{color};font-weight:bold;'>{days} days</td>"
                  f"<td style='padding:10px 12px;border-bottom:1px solid #eee;"
                  f"color:{color};font-weight:bold;'>{badge}</td>"
                  f"</tr>"
              )

          prefix  = "🔴 CRITICAL" if any_critical else "⚠️ WARNING"
          subject = f"{prefix}: XFreight pipeline credential(s) expiring soon"

          html = f"""
          <div style="font-family:Arial,sans-serif;max-width:660px;margin:0 auto;padding:24px;">
            <h2 style="color:#1a3a6b;border-bottom:2px solid #1a3a6b;padding-bottom:8px;">
              Pipeline Credential Expiry Warning
            </h2>
            <p>One or more credentials used by the XFreight automation pipeline are
               expiring within <strong>{WARN_DAYS} days</strong>. If not renewed before
               expiry, the morning safety brief, Teams accountability cards, and all
               OneDrive uploads will silently fail.</p>

            <table width="100%" cellpadding="0" cellspacing="0"
                   style="border-collapse:collapse;margin:16px 0;">
              <thead>
                <tr style="background:#1a3a6b;color:white;">
                  <th style="padding:10px 12px;text-align:left;">Credential</th>
                  <th style="padding:10px 12px;text-align:left;">Expires</th>
                  <th style="padding:10px 12px;text-align:left;">Days Left</th>
                  <th style="padding:10px 12px;text-align:left;">Status</th>
                </tr>
              </thead>
              <tbody>{rows}</tbody>
            </table>

            <h3 style="color:#1a3a6b;margin-top:28px;">Renewal steps</h3>

            <p><strong>Azure Client Secret (AZURE_CLIENT_SECRET):</strong></p>
            <ol>
              <li>Azure Portal → Azure Active Directory → App Registrations → find the alvys-pipeline app</li>
              <li>Certificates &amp; secrets → New client secret → set expiry to 24 months → Add</li>
              <li>Copy the <em>Value</em> immediately — it's only shown once</li>
              <li>GitHub → jeffxtrux-svg/alvys-pipeline → Settings → Secrets and variables →
                  Actions → Secrets → update <code>AZURE_CLIENT_SECRET</code></li>
              <li>Same page → Variables → update <code>AZURE_SECRET_EXPIRES</code> to the new
                  expiry date in YYYY-MM-DD format</li>
            </ol>

            <p><strong>GitHub PAT (GH_PAT):</strong></p>
            <ol>
              <li>GitHub → Settings → Developer settings → Personal access tokens →
                  Fine-grained tokens</li>
              <li>Find the alvys-pipeline token → Regenerate → set expiry to 1 year → Generate</li>
              <li>Copy the new token</li>
              <li>GitHub → jeffxtrux-svg/alvys-pipeline → Settings → Secrets and variables →
                  Actions → Secrets → update <code>GH_PAT</code></li>
              <li>Same page → Variables → update <code>GH_PAT_EXPIRES</code> to the new
                  expiry date in YYYY-MM-DD format</li>
            </ol>

            <p style="color:#888;font-size:11px;margin-top:28px;border-top:1px solid #eee;
                      padding-top:12px;">
              XFreight Pipeline · Credential expiry monitor · Runs on the 1st of each month
            </p>
          </div>
          """

          tok = get_token(tenant, client_id, secret)
          to  = [e.strip() for e in os.environ.get("ADMIN_EMAILS", "jeff@xfreight.net")
                 .split(",") if e.strip()]
          send_email(tok, upn, to, subject, html)
          print(f"Expiry warning sent to {to}")
          print(f"Alerts: {[(l, str(e), d) for l, e, d in alerts]}")
          sys.exit(1 if any_critical else 0)
          PY
