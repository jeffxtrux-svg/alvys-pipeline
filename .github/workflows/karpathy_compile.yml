# Karpathy-Wiki auto-compile — runs the librarian rules in
# Karpathy-Wiki/CLAUDE.md against the /raw inbox + current /wiki state,
# writes back into /wiki, and commits the changes.
#
# Uses the Claude Code GitHub Action so the run bills against the Claude
# subscription tied to the OAuth token (CLAUDE_CODE_OAUTH_TOKEN) instead of
# metered Anthropic API usage.

name: Compile Karpathy-Wiki

on:
  workflow_dispatch:

  schedule:
    # Year-round 7:15am and 1:00pm Central, with a 30-min backup behind
    # each primary slot. CDT (UTC-5) and CST (UTC-6) crons both armed;
    # the "Gate to allowed CT hours" step accepts hours {7, 13} so
    # each season's correct slot runs and the off-season twin is
    # skipped. Backup-slot idempotency is naturally handled: if the
    # primary already compiled + committed to main, the backup's
    # checkout pulls those /wiki/ changes, the librarian re-runs and
    # produces identical output, and the commit step's "no changes"
    # check exits cleanly. Morning run lands ~2h after the scorecard
    # email commits today's brief to Karpathy-Wiki/raw/; afternoon
    # run catches any midday additions.
    #
    # 7am CT slot (primary + 30-min backup):
    - cron: '15 12 * * *'   # 7:15am CDT primary  / 6:15am CST gated
    - cron: '45 12 * * *'   # 7:45am CDT backup   / 6:45am CST gated
    - cron: '15 13 * * *'   # 8:15am CDT gated    / 7:15am CST primary
    - cron: '45 13 * * *'   # 8:45am CDT gated    / 7:45am CST backup
    # 1pm CT slot (primary + 30-min backup):
    - cron: '0 18 * * *'    # 1:00pm CDT primary  / 12:00pm CST gated
    - cron: '30 18 * * *'   # 1:30pm CDT backup   / 12:30pm CST gated
    - cron: '0 19 * * *'    # 2:00pm CDT gated    / 1:00pm CST primary
    - cron: '30 19 * * *'   # 2:30pm CDT gated    / 1:30pm CST backup

permissions:
  contents: write
  pull-requests: write
  # OIDC token required by anthropics/claude-code-action so it can
  # authenticate against the Claude Code GitHub App without a static
  # CLAUDE_CODE_OAUTH_TOKEN secret. Without this the action fails with
  # "Could not fetch an OIDC token" during setupGitHubToken.
  id-token: write

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Gate to allowed CT hours
        # Year-round targets: 7:15am and 1:00pm Central. Cron minute
        # already enforces the :15/:00 part; this gate just checks the
        # hour. Manual / workflow_dispatch runs bypass the gate so the
        # librarian can be triggered any time.
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          case "$CT_HOUR" in
            7|13) echo "Target slot — proceeding." ;;
            *) echo "Off-target — skipping."; echo "skip=1" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Run librarian (Claude Code)
        if: steps.ct_gate.outputs.skip != '1'
        uses: anthropics/claude-code-action@v1
        # Some action versions only read the OAuth token from the env, others
        # only from the `with:` input. Pass it both ways so either works.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The Action's default sandbox is read-mostly — it allows Read,
          # Glob, Grep, Bash, but BLOCKS Write/Edit/MultiEdit unless we
          # opt in. Without these the librarian runs successfully but can't
          # actually save any /wiki pages (you'll see permission_denials_count
          # > 0 and "No /wiki changes from this run" in the next step).
          claude_args: '--allowed-tools "Read,Glob,Grep,Bash,Write,Edit,MultiEdit"'
          prompt: |
            You are the Karpathy-Wiki librarian. Your instructions live in
            `Karpathy-Wiki/CLAUDE.md` — read that file first, follow it
            exactly.

            Today's task:
              1. Read the librarian rules in `Karpathy-Wiki/CLAUDE.md`.
              2. Read every file under `Karpathy-Wiki/raw/` (modified in the
                 last 30 days takes priority).
              3. Read the current state of `Karpathy-Wiki/wiki/` so you
                 don't duplicate existing pages.
              4. Compile what's new: create or update pages in
                 `Karpathy-Wiki/wiki/`, cross-link with [[wikilinks]], and
                 rewrite `Karpathy-Wiki/wiki/index.md` so it lists every
                 page grouped by topic with a one-line description.

            Hard rules (enforce on yourself):
              - NEVER modify, delete, or rename anything under
                `Karpathy-Wiki/raw/`.
              - Only write under `Karpathy-Wiki/wiki/`.
              - Don't touch any other directory in the repo (src/, .github/,
                docs/, tests/, etc.).
              - Don't fabricate facts to fill gaps; if a topic is thin in
                /raw, write a short stub and link it.

            When you're done, list what you created, what you updated, and
            any source contradictions you noticed.

      - name: Commit /wiki updates
        if: always() && steps.ct_gate.outputs.skip != '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if ! git status --porcelain Karpathy-Wiki/wiki 2>/dev/null | grep -q .; then
            echo "No /wiki changes from this run."
            exit 0
          fi
          # Sanity: refuse to commit if the agent touched /raw or anything
          # outside Karpathy-Wiki/wiki/.
          if git status --porcelain Karpathy-Wiki/raw 2>/dev/null | grep -q .; then
            echo "ERROR: /raw was modified — refusing to commit."
            git diff --stat Karpathy-Wiki/raw
            exit 1
          fi
          OUT_OF_TREE=$(git status --porcelain | awk '{print $2}' | grep -v '^Karpathy-Wiki/wiki/' || true)
          if [ -n "$OUT_OF_TREE" ]; then
            echo "ERROR: agent touched files outside Karpathy-Wiki/wiki/:"
            echo "$OUT_OF_TREE"
            exit 1
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="${GITHUB_REF_NAME}"
          # The Claude Code Action sets up its own git auth during the
          # librarian step and removes it on exit, leaving the remote URL
          # without credentials. Re-point origin at an authenticated URL
          # built from the workflow's GITHUB_TOKEN so push (and fetch)
          # work again. x-access-token is the documented username GitHub
          # expects for Actions tokens.
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add Karpathy-Wiki/wiki
          git commit -m "wiki: librarian compile $(date -u +%Y-%m-%dT%H:%M)"
          for delay in 1 2 4 8 16; do
            git fetch origin "$BRANCH" 2>/dev/null || true
            git rebase "origin/$BRANCH" 2>/dev/null || { git rebase --abort 2>/dev/null || true; }
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            echo "Push conflicted, retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "Failed to push after retries"; exit 1
