# XFreight KPI → Google Sheets refresh
# Runs 5 times a day (5am, 9am, 12pm, 3pm, 6pm CT). Each target hour has TWO
# cron arms (:00 and :30) so a single GitHub-cron drop doesn't lose the slot.
# Concurrency limit prevents overlapping runs when both arms land.

name: Refresh Google Sheets KPI Dashboard

on:
  workflow_dispatch:

  schedule:
    # Year-round 5 targets at 5am, 9am, 12pm, 3pm, 6pm Central. Dual cron
    # arms (:00 and :30) per slot — if GitHub drops the :00 arm, the :30
    # still lands. The "Gate to allowed CT hours" step rejects anything
    # outside {5, 9, 12, 15, 18}.
    #
    # CT slot → UTC arms (CDT=UTC-5 / CST=UTC-6):
    #   5 AM  CT → 10 (CDT) / 11 (CST)
    #   9 AM  CT → 14 (CDT) / 15 (CST)
    #   12 PM CT → 17 (CDT) / 18 (CST)
    #   3 PM  CT → 20 (CDT) / 21 (CST)
    #   6 PM  CT → 23 (CDT) /  0 (CST, rolls to next UTC day)
    - cron: '0,30 0,10,11,14,15,17,18,20,21,23 * * *'

# Prevent overlapping runs when both :00 and :30 arms land in the same hour
# (each run takes 3-5 min; the :30 arm would otherwise race the :00 run that
# hasn't finished). cancel-in-progress=false → second run waits, then no-ops
# if it sees fresh marker; if no marker, runs cleanly.
concurrency:
  group: sheets-refresh
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Gate to allowed CT hours
        # Year-round targets: 5am, 9am, 12pm, 3pm, 6pm Central.
        # Manual / workflow_call / push runs bypass.
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          case "$CT_HOUR" in
            5|9|12|15|18) echo "Target slot — proceeding." ;;
            *) echo "Off-target — skipping."; echo "skip=1" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Write GCP credentials to temp file
        if: steps.ct_gate.outputs.skip != '1'
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/gcp-sa.json

      - name: Run Sheets pipeline
        if: steps.ct_gate.outputs.skip != '1'
        env:
          GCP_SERVICE_ACCOUNT_JSON: /tmp/gcp-sa.json
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          ALVYS_CLIENT_ID: ${{ secrets.ALVYS_CLIENT_ID }}
          ALVYS_CLIENT_SECRET: ${{ secrets.ALVYS_CLIENT_SECRET }}
          SAMSARA_API_TOKEN: ${{ secrets.SAMSARA_API_TOKEN }}
          QB_CLIENT_ID: ${{ secrets.QB_CLIENT_ID }}
          QB_CLIENT_SECRET: ${{ secrets.QB_CLIENT_SECRET }}
          QB_XTRUX_REFRESH_TOKEN: ${{ secrets.QB_XTRUX_REFRESH_TOKEN }}
          QB_TRUKWAY_REFRESH_TOKEN: ${{ secrets.QB_TRUKWAY_REFRESH_TOKEN }}
          QB_XLINX_REFRESH_TOKEN: ${{ secrets.QB_XLINX_REFRESH_TOKEN }}
          QB_NJ_TRAILERS_REFRESH_TOKEN: ${{ secrets.QB_NJ_TRAILERS_REFRESH_TOKEN }}
          QB_NJ_PROPERTIES_REFRESH_TOKEN: ${{ secrets.QB_NJ_PROPERTIES_REFRESH_TOKEN }}
          QB_NJ_TRAILERS_REALM_ID: ${{ secrets.QB_NJ_TRAILERS_REALM_ID }}
          QB_NJ_PROPERTIES_REALM_ID: ${{ secrets.QB_NJ_PROPERTIES_REALM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHEETS_START_DATE: '2024-01-01'
        run: python -m src.sheets_main
