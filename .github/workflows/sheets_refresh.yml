# XFreight KPI → Google Sheets refresh
# Pulls from Alvys, QuickBooks, and Samsara and writes all tabs to the KPI Dashboard sheet.

name: Refresh Google Sheets KPI Dashboard

on:
  workflow_dispatch:

  schedule:
    - cron: '0 13 * * *'   # 7am CT (DST) / 8am CT (standard) — morning refresh

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP credentials to temp file
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/gcp-sa.json

      - name: Run Sheets pipeline
        env:
          GCP_SERVICE_ACCOUNT_JSON: /tmp/gcp-sa.json
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          ALVYS_CLIENT_ID: ${{ secrets.ALVYS_CLIENT_ID }}
          ALVYS_CLIENT_SECRET: ${{ secrets.ALVYS_CLIENT_SECRET }}
          SAMSARA_API_TOKEN: ${{ secrets.SAMSARA_API_TOKEN }}
          QB_CLIENT_ID: ${{ secrets.QB_CLIENT_ID }}
          QB_CLIENT_SECRET: ${{ secrets.QB_CLIENT_SECRET }}
          QB_XTRUX_REFRESH_TOKEN: ${{ secrets.QB_XTRUX_REFRESH_TOKEN }}
          QB_TRUKWAY_REFRESH_TOKEN: ${{ secrets.QB_TRUKWAY_REFRESH_TOKEN }}
          QB_XLINX_REFRESH_TOKEN: ${{ secrets.QB_XLINX_REFRESH_TOKEN }}
          QB_NJ_TRAILERS_REFRESH_TOKEN: ${{ secrets.QB_NJ_TRAILERS_REFRESH_TOKEN }}
          QB_NJ_PROPERTIES_REFRESH_TOKEN: ${{ secrets.QB_NJ_PROPERTIES_REFRESH_TOKEN }}
          QB_NJ_TRAILERS_REALM_ID: ${{ secrets.QB_NJ_TRAILERS_REALM_ID }}
          QB_NJ_PROPERTIES_REALM_ID: ${{ secrets.QB_NJ_PROPERTIES_REALM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHEETS_START_DATE: '2024-01-01'
        run: python -m src.sheets_main

      - name: Write run summary for Karpathy-Wiki
        if: success()
        run: python -m src.write_run_summary sheets

      - name: Commit Karpathy-Wiki archive
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if ! git status --porcelain Karpathy-Wiki/raw 2>/dev/null | grep -q .; then
            echo "No Karpathy-Wiki updates from this run."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="${GITHUB_REF_NAME}"
          git add Karpathy-Wiki/raw
          git commit -m "data: ${{ github.workflow }} $(date -u +%Y-%m-%dT%H:%M)"
          for delay in 1 2 4 8 16; do
            git fetch origin "$BRANCH" 2>/dev/null || true
            git rebase "origin/$BRANCH" 2>/dev/null || { git rebase --abort 2>/dev/null || true; }
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            echo "Push conflicted, retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "Failed to push after retries"; exit 1
