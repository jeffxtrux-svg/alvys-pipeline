# QuickBooks data refresh — runs 3x/day, writes QB_*.xlsx files to OneDrive/QuickBooks/
#
# Refresh tokens rotate on every run (QB requirement). The new token is written
# back to GitHub Secrets via gh CLI using GH_PAT. If rotation fails, the old
# token stays valid for ~100 days before expiring.
#
# GitHub Secrets required:
#   QB_CLIENT_ID, QB_CLIENT_SECRET
#   QB_XTRUX_REFRESH_TOKEN, QB_TRUKWAY_REFRESH_TOKEN, QB_XLINX_REFRESH_TOKEN
#   QB_NJ_TRAILERS_REFRESH_TOKEN, QB_NJ_PROPERTIES_REFRESH_TOKEN  (add when ready)
#   GH_PAT  — Personal Access Token with repo scope (for secret rotation)
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET  (shared with Alvys)
#   ONEDRIVE_USER_UPN

name: Refresh QuickBooks data

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    # Year-round 4am / 11am / 5pm Central (concurrent with Alvys + Samsara).
    # CDT crons (UTC-5) + CST crons (UTC-6); the "Gate to allowed CT hours"
    # step gates whichever season's slots are off-target so each pull fires
    # exactly 3× per day. The QB token rotation is idempotent — if a gated
    # run skips, the next on-target one rotates as usual.
    - cron: '0 9 * * *'    # CDT 4am  / CST 3am  (CST: gated)
    - cron: '0 16 * * *'   # CDT 11am / CST 10am (CST: gated)
    - cron: '0 22 * * *'   # CDT 5pm  / CST 4pm  (CST: gated)
    - cron: '0 10 * * *'   # CDT 5am  / CST 4am  (CDT: gated)
    - cron: '0 17 * * *'   # CDT 12pm / CST 11am (CDT: gated)
    - cron: '0 23 * * *'   # CDT 6pm  / CST 5pm  (CDT: gated)

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Gate to allowed CT hours
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          case "$CT_HOUR" in
            4|11|17) echo "Target slot — proceeding." ;;
            *) echo "Off-target — skipping."; echo "skip=1" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Pull QuickBooks data
        if: steps.ct_gate.outputs.skip != '1'
        env:
          QB_CLIENT_ID: ${{ secrets.QB_CLIENT_ID }}
          QB_CLIENT_SECRET: ${{ secrets.QB_CLIENT_SECRET }}
          QB_XTRUX_REFRESH_TOKEN: ${{ secrets.QB_XTRUX_REFRESH_TOKEN }}
          QB_TRUKWAY_REFRESH_TOKEN: ${{ secrets.QB_TRUKWAY_REFRESH_TOKEN }}
          QB_XLINX_REFRESH_TOKEN: ${{ secrets.QB_XLINX_REFRESH_TOKEN }}
          QB_NJ_TRAILERS_REALM_ID: ""
          QB_NJ_TRAILERS_REFRESH_TOKEN: ${{ secrets.QB_NJ_TRAILERS_REFRESH_TOKEN }}
          QB_NJ_PROPERTIES_REALM_ID: ""
          QB_NJ_PROPERTIES_REFRESH_TOKEN: ${{ secrets.QB_NJ_PROPERTIES_REFRESH_TOKEN }}
          QB_OUTPUT_DIR: output/quickbooks
          # GH_PAT used by gh CLI to rotate refresh tokens back into Secrets
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python -m src.qb_main

      - name: Upload QB files to OneDrive
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          QB_OUTPUT_DIR: output/quickbooks
        run: python -m src.qb_onedrive_upload

