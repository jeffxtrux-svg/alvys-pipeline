# Alvys data refresh — runs 3x/day, writes Alvys_Master.xlsx to OneDrive

name: Refresh Alvys data

on:
  # Manual trigger from the Actions tab — use this to test
  workflow_dispatch:

  # Reusable so the "Refresh All" workflow can call it.
  workflow_call:

  # GitHub Actions cron is fixed UTC and ignores DST. To hit the same
  # Central wall-clock times year-round (4am / 11am / 5pm CT), we arm
  # two cron families — one for CDT (UTC-5) and one for CST (UTC-6) —
  # and the "Gate to allowed CT hours" step at the top of the job exits
  # any cron whose Central-time hour isn't in the target set. Exactly
  # three runs per day, regardless of DST.
  schedule:
    - cron: '0 9 * * *'    # CDT 4am  / CST 3am  (CST: gated)
    - cron: '0 16 * * *'   # CDT 11am / CST 10am (CST: gated)
    - cron: '0 22 * * *'   # CDT 5pm  / CST 4pm  (CST: gated)
    - cron: '0 10 * * *'   # CDT 5am  / CST 4am  (CDT: gated)
    - cron: '0 17 * * *'   # CDT 12pm / CST 11am (CDT: gated)
    - cron: '0 23 * * *'   # CDT 6pm  / CST 5pm  (CDT: gated)

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Gate to allowed CT hours
        # Year-round target: 4am, 11am, 5pm Central. The CDT and CST cron
        # families each fire 6× a day across the two; this step lets only
        # the run whose Central-time hour matches one of the target slots
        # actually do work. Manual / workflow_call / push trigger bypass.
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          case "$CT_HOUR" in
            4|11|17) echo "Target slot — proceeding." ;;
            *) echo "Off-target — skipping."; echo "skip=1" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Run Alvys pull
        if: steps.ct_gate.outputs.skip != '1'
        env:
          ALVYS_CLIENT_ID: ${{ secrets.ALVYS_CLIENT_ID }}
          ALVYS_CLIENT_SECRET: ${{ secrets.ALVYS_CLIENT_SECRET }}
          ALVYS_START_DATE: '2024-01-01'
          OUTPUT_DIR: output
        run: python -m src.main

      - name: Upload to OneDrive
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          ONEDRIVE_FOLDER_PATH: ""
          # Uploads as "Alvys Pipeline.xlsx" — the API-data half of the
          # hybrid merge. The desktop "Alvys Master Fixer" tool downloads
          # this, overlays X-Trux Driver Rate from the manual TMS export
          # (the one field the API can't provide accurately), and uploads
          # the merged result as "Alvys Master 2026.xlsx" for Power BI.
          ONEDRIVE_TARGET_FILENAME: "Alvys Pipeline.xlsx"
          OUTPUT_DIR: output
        run: python -m src.onedrive_upload

      # Belt-and-suspenders: also upload as a workflow artifact, so the file
      # is downloadable from the Actions tab even if OneDrive upload had issues.
      # Includes _debug/ folder with sample JSON records and rate-type
      # inventory — useful for diagnosing column-mapping issues.
      - name: Upload output folder as artifact
        if: always() && steps.ct_gate.outputs.skip != '1'
        uses: actions/upload-artifact@v4
        with:
          name: alvys-master-${{ github.run_number }}
          path: output/
          retention-days: 7
