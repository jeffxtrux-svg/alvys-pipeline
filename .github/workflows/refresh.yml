# Alvys data refresh — runs 3x/day, writes Alvys_Master.xlsx to OneDrive

name: Refresh Alvys data

on:
  # Manual trigger from the Actions tab — use this to test
  workflow_dispatch:

  # TEMPORARY: one-shot trigger on push (removed right after).
  push:
    branches: [claude/claude-md-docs-Es64x]

  # Cron times are in UTC. Adjust for Central time as needed.
  # Below = 5am, 12pm, 6pm Central (US/Central is UTC-6 in standard time, UTC-5 in DST)
  schedule:
    - cron: '0 11 * * *'   # 5am CT (winter) / 6am CT (DST)
    - cron: '0 18 * * *'   # 12pm CT (winter) / 1pm CT (DST)
    - cron: '0 0 * * *'    # 6pm CT (winter) / 7pm CT (DST)

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alvys pull
        env:
          ALVYS_CLIENT_ID: ${{ secrets.ALVYS_CLIENT_ID }}
          ALVYS_CLIENT_SECRET: ${{ secrets.ALVYS_CLIENT_SECRET }}
          ALVYS_START_DATE: '2024-01-01'
          OUTPUT_DIR: output
        run: python -m src.main

      - name: Upload to OneDrive
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          ONEDRIVE_FOLDER_PATH: ""
          # Distinct name — must NOT collide with the hand-maintained
          # "Alvys Master 2026.xlsx" that the Power BI report reads, or the
          # pipeline's computed data would overwrite the manual workbook.
          ONEDRIVE_TARGET_FILENAME: "Alvys Pipeline.xlsx"
          OUTPUT_DIR: output
        run: python -m src.onedrive_upload

      # Belt-and-suspenders: also upload as a workflow artifact, so the file
      # is downloadable from the Actions tab even if OneDrive upload had issues.
      # Includes _debug/ folder with sample JSON records and rate-type
      # inventory — useful for diagnosing column-mapping issues.
      - name: Upload output folder as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alvys-master-${{ github.run_number }}
          path: output/
          retention-days: 7

      - name: Write run summary for Karpathy-Wiki
        if: success()
        run: python -m src.write_run_summary alvys output/Alvys_Master.xlsx

      - name: Commit Karpathy-Wiki archive
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if ! git status --porcelain Karpathy-Wiki/raw 2>/dev/null | grep -q .; then
            echo "No Karpathy-Wiki updates from this run."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="${GITHUB_REF_NAME}"
          git add Karpathy-Wiki/raw
          git commit -m "data: ${{ github.workflow }} $(date -u +%Y-%m-%dT%H:%M)"
          for delay in 1 2 4 8 16; do
            git fetch origin "$BRANCH" 2>/dev/null || true
            git rebase "origin/$BRANCH" 2>/dev/null || { git rebase --abort 2>/dev/null || true; }
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            echo "Push conflicted, retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "Failed to push after retries"; exit 1
