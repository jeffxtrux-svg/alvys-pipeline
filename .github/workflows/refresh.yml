# Alvys data refresh — runs 3x/day, writes Alvys_Master.xlsx to OneDrive

name: Refresh Alvys data

on:
  # Manual trigger from the Actions tab — use this to test
  workflow_dispatch:

  # Cron times are in UTC. Locked to **CDT** (Central Daylight Time, the current
  # season) so the morning pull lands at 5am Central year-round during DST and
  # 4am Central during standard time (the alternative — locking to CST — runs
  # at 6am during DST, which is the wrong "morning" for the daily brief).
  schedule:
    - cron: '0 10 * * *'   # 5am CT (DST) / 4am CT (standard)
    - cron: '0 17 * * *'   # 12pm CT (DST) / 11am CT (standard)
    - cron: '0 23 * * *'   # 6pm CT (DST) / 5pm CT (standard)

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alvys pull
        env:
          ALVYS_CLIENT_ID: ${{ secrets.ALVYS_CLIENT_ID }}
          ALVYS_CLIENT_SECRET: ${{ secrets.ALVYS_CLIENT_SECRET }}
          ALVYS_START_DATE: '2024-01-01'
          OUTPUT_DIR: output
        run: python -m src.main

      - name: Upload to OneDrive
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          ONEDRIVE_FOLDER_PATH: ""
          # Distinct name — must NOT collide with the hand-maintained
          # "Alvys Master 2026.xlsx" that the Power BI report reads, or the
          # pipeline's computed data would overwrite the manual workbook.
          ONEDRIVE_TARGET_FILENAME: "Alvys Pipeline.xlsx"
          OUTPUT_DIR: output
        run: python -m src.onedrive_upload

      # Belt-and-suspenders: also upload as a workflow artifact, so the file
      # is downloadable from the Actions tab even if OneDrive upload had issues.
      # Includes _debug/ folder with sample JSON records and rate-type
      # inventory — useful for diagnosing column-mapping issues.
      - name: Upload output folder as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alvys-master-${{ github.run_number }}
          path: output/
          retention-days: 7
