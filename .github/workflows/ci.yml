# Continuous integration — runs the test suites on every PR and push to main.
# No secrets/network needed: the tests are offline and only need the pinned deps,
# so this also guards against a dependency-version drift (e.g. pandas major bumps).

name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suites
        run: |
          python tests/test_rpm_goal.py
          python tests/test_scorecard_alvys.py
          python tests/test_margin_projection.py
          python tests/test_refresh_status.py
          python tests/test_decision_report.py
          python tests/test_brief_extensions.py
          python tests/test_schema_drift.py
          python tests/test_sambasafety_combine.py
          python tests/test_sambasafety_client.py
