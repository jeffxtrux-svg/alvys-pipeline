# Daily upload healthcheck — fires at 6:00am Central if the morning
# daily MTD upload hasn't been sent yet. Mirrors the scorecard
# healthcheck so a dropped 4:30am cron doesn't leave the upload missing
# until someone notices mid-morning.
#
# How it works:
#   1. Cron fires at 6:00am Central (dual-cron + CT-hour-gate, year-round).
#   2. Authenticate to Microsoft Graph using the same Azure app as the
#      daily upload.
#   3. Check whether the `DailyUpload/sent-{YYYY-MM-DD}.txt` marker exists
#      in OneDrive for today (Central time).
#   4. If marker present → exit cleanly. Healthcheck passed.
#   5. If marker absent → dispatch daily_upload.yml via the GitHub API.
#      That run fires immediately and sends the brief; src/daily_upload.py
#      writes the marker on success.
#
# No collision: daily_upload.yml fires at 4:30am CT (cron 30 9,10
# gated to hour 4), so the 6am healthcheck slot is exclusive.
#
# Required GitHub Secrets (shared with daily_upload.yml):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET

name: Daily Upload healthcheck (6:00am CT)

on:
  workflow_dispatch:

  schedule:
    # Year-round 6:00am Central. CDT (UTC-5) + CST (UTC-6) crons both
    # armed; the "Gate to 6am CT" step rejects the off-season slot.
    - cron: '0 11 * * *'    # 6:00am CDT / 5:00am CST (CST: gated)
    - cron: '0 12 * * *'    # 7:00am CDT (CDT: gated) / 6:00am CST

permissions:
  contents: read
  actions: write   # required to dispatch daily_upload.yml via gh CLI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Gate to 6am CT
        # Year-round target: 6:00am Central. Skip whichever season's
        # cron lands on the wrong wall-clock hour. Manual /
        # workflow_dispatch runs bypass the gate so the healthcheck
        # can be triggered any time on demand.
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          if [ "$CT_HOUR" -ne 6 ]; then
            echo "Off-target — skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "6am CT slot — proceeding."
          fi

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        # Only need msal + requests to call Graph; no pandas etc. needed
        # for a marker-presence check. python-dotenv is required because
        # src/onedrive_upload.py imports load_dotenv at module load.
        run: pip install msal requests python-dotenv

      - name: Check today's daily-upload marker
        if: steps.ct_gate.outputs.skip != '1'
        id: marker
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
        run: |
          python - <<'PY'
          """
          Check whether the daily upload marker file exists in OneDrive.

          Marker path follows the convention in src/daily_upload.py:
              DailyUpload/sent-{YYYY-MM-DD}.txt
          where the date is today in America/Chicago.
          """
          import os
          import sys
          from datetime import datetime
          from zoneinfo import ZoneInfo

          # Reuse the same Graph helpers the daily upload uses so the
          # auth and download semantics are identical.
          sys.path.insert(0, ".")
          from src.onedrive_upload import get_token, download_file
          import requests

          today = datetime.now(ZoneInfo("America/Chicago")).strftime("%Y-%m-%d")
          marker_path = f"DailyUpload/sent-{today}.txt"

          print(f"Checking marker for {today} → {marker_path}")
          tok = get_token(
              os.environ["AZURE_TENANT_ID"],
              os.environ["AZURE_CLIENT_ID"],
              os.environ["AZURE_CLIENT_SECRET"],
          )

          try:
              download_file(tok, os.environ["ONEDRIVE_USER_UPN"], marker_path)
              print(f"✓ Marker found — daily upload already sent today. Healthcheck PASS.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("needs_send=0\n")
          except requests.HTTPError as e:
              code = e.response.status_code if e.response is not None else None
              if code == 404:
                  print(f"⚠ No marker — daily upload NOT yet sent today.")
                  print(f"  Will dispatch daily_upload.yml to recover.")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("needs_send=1\n")
              else:
                  print(f"Unexpected Graph error ({code}) — failing closed (treating as needs_send to be safe).")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("needs_send=1\n")
          except Exception as e:
              # Any other error (auth, network) — fail closed: dispatch
              # the daily upload. If the marker actually was there, the
              # daily upload's own idempotency check will dedupe on its end
              # (dispatched runs bypass it, but that's the same tradeoff
              # the scorecard healthcheck accepts).
              print(f"Marker check raised {type(e).__name__}: {e}")
              print(f"Failing closed — dispatching daily_upload to be safe.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("needs_send=1\n")
          PY

      - name: Dispatch daily_upload.yml (marker missing)
        if: steps.ct_gate.outputs.skip != '1' && steps.marker.outputs.needs_send == '1'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Dispatching daily_upload.yml via gh workflow run…"
          gh workflow run daily_upload.yml --ref main
          echo "✓ Dispatched. Daily upload should land in ~3-5 minutes."

      - name: Healthcheck summary
        if: steps.ct_gate.outputs.skip != '1'
        run: |
          if [ "${{ steps.marker.outputs.needs_send }}" = "1" ]; then
            echo "::warning::Daily upload healthcheck recovered a missed morning send."
          else
            echo "::notice::Daily upload healthcheck OK — already sent for today."
          fi

      # Notify on failure so a broken healthcheck doesn't go silent.
      # Reuses the same Graph send_email function as the daily upload.
      - name: Notify on failure
        if: failure() && steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          DAILY_UPLOAD_TO_EMAILS: ${{ secrets.DAILY_UPLOAD_RECIPIENTS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          import sys
          sys.path.insert(0, ".")
          from src.onedrive_upload import get_token
          from src.scorecard_email import send_email
          tok = get_token(
              os.environ["AZURE_TENANT_ID"],
              os.environ["AZURE_CLIENT_ID"],
              os.environ["AZURE_CLIENT_SECRET"],
          )
          to = [e.strip() for e in os.environ.get("DAILY_UPLOAD_TO_EMAILS", "jeff@xfreight.net").split(",") if e.strip()]
          run = os.environ.get("RUN_URL", "")
          html = (
              f"<p>The <b>daily upload healthcheck</b> at 6:00am CT failed — "
              f"this morning's Daily_Upload_*.xlsx may or may not have landed.</p>"
              f"<p>Manually verify by checking jeff@xfreight.net inbox for "
              f"\"XFreight Daily MTD Upload — \" with today's date.</p>"
              f"<p>Run log: <a href='{run}'>{run}</a></p>"
          )
          send_email(
              tok,
              os.environ["ONEDRIVE_USER_UPN"],
              to,
              "⚠️ XFreight daily-upload HEALTHCHECK failed",
              html,
          )
          PY
