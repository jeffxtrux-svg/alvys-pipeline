# Samsara data refresh — runs 3x/day, writes Samsara_Master.xlsx to OneDrive

name: Refresh Samsara data

on:
  # Manual trigger from the Actions tab — use this to test
  workflow_dispatch:

  # TEMPORARY: one-shot trigger on push (removed right after).
  push:
    branches: [claude/claude-md-docs-Es64x]

  # Same UTC schedule as Alvys: 5am, 12pm, 6pm Central
  schedule:
    - cron: '0 11 * * *'   # 5am CT (winter) / 6am CT (DST)
    - cron: '0 18 * * *'   # 12pm CT (winter) / 1pm CT (DST)
    - cron: '0 0 * * *'    # 6pm CT (winter) / 7pm CT (DST)

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull Samsara data
        env:
          SAMSARA_API_TOKEN: ${{ secrets.SAMSARA_API_TOKEN }}
          SAMSARA_DAYS_BACK: '90'
          # Safety/DVIR/HOS-violation history for the scorecard's 6-month window.
          SAMSARA_SAFETY_DAYS_BACK: '190'
          SAMSARA_OUTPUT_DIR: output/samsara
        run: python -m src.samsara_main

      - name: Upload to OneDrive
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          SAMSARA_OUTPUT_DIR: output/samsara
        run: python -m src.samsara_onedrive_upload

      - name: Check diagnostics and send alerts
        # Requires Mail.Send Application permission on the Azure app registration.
        # See src/samsara_alerts.py docstring for setup instructions.
        env:
          SAMSARA_API_TOKEN: ${{ secrets.SAMSARA_API_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ALERT_FROM_UPN: jeff@xfreight.net
          ALERT_TO_EMAILS: ${{ secrets.ALERT_TO_EMAILS }}
        run: python -m src.samsara_alerts

      - name: Upload output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: samsara-master-${{ github.run_number }}
          path: output/samsara/
          retention-days: 7

      - name: Write run summary for Karpathy-Wiki
        if: success()
        run: python -m src.write_run_summary samsara output/samsara/Samsara_Master.xlsx

      - name: Commit Karpathy-Wiki archive
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if ! git status --porcelain Karpathy-Wiki/raw 2>/dev/null | grep -q .; then
            echo "No Karpathy-Wiki updates from this run."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="${GITHUB_REF_NAME}"
          git add Karpathy-Wiki/raw
          git commit -m "data: ${{ github.workflow }} $(date -u +%Y-%m-%dT%H:%M)"
          for delay in 1 2 4 8 16; do
            git fetch origin "$BRANCH" 2>/dev/null || true
            git rebase "origin/$BRANCH" 2>/dev/null || { git rebase --abort 2>/dev/null || true; }
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            echo "Push conflicted, retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "Failed to push after retries"; exit 1
