# Samsara data refresh — runs 3x/day, writes Samsara_Master.xlsx to OneDrive

name: Refresh Samsara data

on:
  # Manual trigger from the Actions tab — use this to test
  workflow_dispatch:
    inputs:
      force_cert_nudge:
        description: "Bypass today's cert-nudge marker (resend even if already sent today)"
        type: boolean
        default: false

  # Reusable so the "Refresh All" workflow can call it.
  workflow_call:

  # Year-round 4am / 11am / 5pm Central. CDT crons (UTC-5) + CST crons
  # (UTC-6); the "Gate to allowed CT hours" step rejects whichever
  # season's crons aren't currently active so each job fires exactly
  # 3× per day across the DST transitions.
  schedule:
    - cron: '0 9 * * *'    # CDT 4am  / CST 3am  (CST: gated)
    - cron: '0 16 * * *'   # CDT 11am / CST 10am (CST: gated)
    - cron: '0 22 * * *'   # CDT 5pm  / CST 4pm  (CST: gated)
    - cron: '0 10 * * *'   # CDT 5am  / CST 4am  (CDT: gated)
    - cron: '0 17 * * *'   # CDT 12pm / CST 11am (CDT: gated)
    - cron: '0 23 * * *'   # CDT 6pm  / CST 5pm  (CDT: gated)

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Gate to allowed CT hours
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          case "$CT_HOUR" in
            4|11|17) echo "Target slot — proceeding." ;;
            *) echo "Off-target — skipping."; echo "skip=1" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Pull Samsara data
        if: steps.ct_gate.outputs.skip != '1'
        env:
          SAMSARA_API_TOKEN: ${{ secrets.SAMSARA_API_TOKEN }}
          SAMSARA_DAYS_BACK: '90'
          # Safety/DVIR/HOS-violation history for the scorecard's 6-month window.
          SAMSARA_SAFETY_DAYS_BACK: '190'
          SAMSARA_OUTPUT_DIR: output/samsara
        run: python -m src.samsara_main

      - name: Upload to OneDrive
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          SAMSARA_OUTPUT_DIR: output/samsara
        run: python -m src.samsara_onedrive_upload

      - name: Detect empty-sheet regressions
        if: steps.ct_gate.outputs.skip != '1'
        # Compares per-sheet row counts to the previous run's snapshot
        # in OneDrive (Samsara/_row_counts.json). Emails the alert list
        # whenever a sheet that had data yesterday lands empty today —
        # surfaces silent API regressions (lost scope, drifted date
        # window, retired field type) that write_samsara_xlsx would
        # otherwise mask with a placeholder sheet.
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          SAMSARA_OUTPUT_DIR: output/samsara
          ALERT_FROM_UPN: jeff@xfreight.net
          ALERT_TO_EMAILS: jeff@xfreight.net,jackson@xfreight.net,dan@xfreight.net
        run: python -m src.samsara_regression_check

      - name: Check diagnostics and send alerts
        if: steps.ct_gate.outputs.skip != '1'
        # Requires Mail.Send Application permission on the Azure app registration.
        # See src/samsara_alerts.py docstring for setup instructions.
        env:
          SAMSARA_API_TOKEN: ${{ secrets.SAMSARA_API_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ALERT_FROM_UPN: jeff@xfreight.net
          ALERT_TO_EMAILS: jeff@xfreight.net,jackson@xfreight.net,dan@xfreight.net
        run: python -m src.samsara_alerts

      - name: Nudge drivers with uncertified logs
        if: steps.ct_gate.outputs.skip != '1'
        # Posts a Samsara Driver App message to each driver who has
        # uncertified daily logs in the last 7 days, excluding today's
        # still-open log and placeholder driver accounts. Marker file
        # in OneDrive prevents repeat sends within the same Central-
        # time day, so the 3x/day Samsara pull only nudges once.
        #
        # Token requires Write Messages scope (Driver Workflow). If the
        # scope is missing the POST returns 403 and the run carries on
        # silently — set CERT_NUDGE_DRY_RUN=1 to log without sending.
        env:
          SAMSARA_API_TOKEN: ${{ secrets.SAMSARA_API_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          CERT_NUDGE_FORCE: ${{ inputs.force_cert_nudge && '1' || '' }}
        run: python -m src.samsara_cert_nudge

