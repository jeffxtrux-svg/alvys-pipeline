# Slack/Teams morning digest — Phase 3A delivery surface.
#
# Posts a compact summary of the brief (MTD KPIs + tripped risk signals
# + decision grades) to an incoming webhook URL right after the
# scorecard email lands. Source files are written by the scorecard run
# itself (snapshot, risk-watch-latest.json, decision-grades.json) and
# mirrored to OneDrive (Scorecard/*.json) — this job reads them from
# there, not from git, since Karpathy-Wiki/raw is gitignored and the
# scorecard workflow's commit step never stages Karpathy-Wiki/wiki either.
# This job is pure presentation — no re-compute.
#
# Required secret to actually post:
#   SLACK_WEBHOOK_URL  — Slack or Teams incoming-webhook URL.
#     Slack:  https://api.slack.com/messaging/webhooks
#     Teams:  https://learn.microsoft.com/en-us/microsoftteams/platform/webhooks-and-connectors/how-to/add-incoming-webhook
#     Either accepts the Block Kit payload shape this workflow posts.
#
# Also needs the standard Azure/OneDrive secrets (shared with the rest of
# the pipeline) to read its OneDrive source files:
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, ONEDRIVE_USER_UPN
#
# Without SLACK_WEBHOOK_URL, the job still runs and exits cleanly with a
# log warning (composed but not posted) — useful for dry-running the
# digest content against a real brief.

name: Slack/Teams morning digest

on:
  # Auto-fires when the scorecard email workflow completes successfully.
  workflow_run:
    workflows: ["Daily KPI Scorecard Email"]
    types: [completed]

  # Manual run for testing the digest formatting.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true → print payload, do not POST'
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # When triggered by workflow_run, only fire if the scorecard succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repo (latest main)
        uses: actions/checkout@v4
        with:
          # Pin to main so this always runs the latest digest code,
          # independent of which commit triggered the scorecard run.
          # Source data (snapshot/signals/grades) comes from OneDrive, not
          # this checkout — see the module docstrings in scorecard_snapshots.py /
          # risk_watch.py / decision_grader.py for why local files don't survive
          # past the scorecard job's own runner.
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # requests to POST the webhook + read from OneDrive; python-dotenv
        # because src.onedrive_upload imports it at module level. Keep this
        # slim (no full requirements.txt) so the digest stays fast.
        run: pip install requests python-dotenv

      - name: Compose and post digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: ${{ secrets.ONEDRIVE_USER_UPN }}
          RUN_URL: ${{ github.event.workflow_run.html_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m src.slack_digest --dry-run
          else
            python -m src.slack_digest
          fi
