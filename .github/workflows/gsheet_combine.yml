# Combine OneDrive reports → Google Sheet (X-Freight KPI Dashboard)
#
# Runs 3x/day at 8:30am, 12:00pm, 15:30pm Central. Reads xlsx files from
# OneDrive (root Alvys Master, /QuickBooks, /Samsara) and rebuilds tabs in
# the Google Sheet identified by GOOGLE_SHEET_ID, plus a formula-driven
# Dashboard tab.
#
# Note: the 12:00pm run fires 30 minutes BEFORE the QuickBooks refresh
# (qb_refresh.yml at 12:30pm CT). At 12:00pm the QB tabs reflect the
# previous day's 6:30pm pull. Acceptable, but if you want the noon run to
# see fresh QB data, push this cron to 13:00 CT or move QB earlier.
#
# GitHub Secrets required:
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET (shared with Alvys/QB/Samsara)
#   GOOGLE_SERVICE_ACCOUNT_JSON  — full JSON key from Google Cloud service account
#
# GitHub Variables required:
#   GOOGLE_SHEET_ID  — set this after the first run logs the new sheet's ID

name: Combine reports to Google Sheet

on:
  workflow_dispatch:
  schedule:
    # Cron is UTC. CT is UTC-5 in DST, UTC-6 in standard time. We schedule both
    # so the runs land at the same wall-clock CT moment year-round; CT runs
    # the workflow twice on the DST boundary day (acceptable).
    # 8:30am CT
    - cron: '30 13 * * *'   # 8:30am CT (DST)
    - cron: '30 14 * * *'   # 8:30am CT (standard)
    # 12:00pm CT
    - cron: '0 17 * * *'    # 12:00pm CT (DST)
    - cron: '0 18 * * *'    # 12:00pm CT (standard)
    # 3:30pm CT
    - cron: '30 20 * * *'   # 3:30pm CT (DST)
    - cron: '30 21 * * *'   # 3:30pm CT (standard)

jobs:
  combine:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Combine OneDrive → Google Sheet
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
          GOOGLE_SHARE_WITH: jeff@xfreight.net
        run: python -m src.gsheet_combine
