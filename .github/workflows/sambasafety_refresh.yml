# SambaSafety data refresh — reads the raw CSV exports that drop into
# OneDrive/SambaSafety/ multiple times a day (Power Automate / manual drop),
# merges them via src.sambasafety_combine, and uploads SambaSafety_Master.xlsx
# back to OneDrive so the scorecard's driver-compliance page stays current.
#
# API mode is RETIRED (2026-06-12): the SambaSafety API token expired
# 2026-06-02 and the API returned "Forbidden" on every run after that; the
# CSV drops are the production source now. SAMBASAFETY_API_TOKEN is
# deliberately NOT passed below — src.sambasafety_main runs CSV-drop mode
# whenever the token is absent. (The API client code remains in the repo
# if it's ever wanted again.)
#
# Scheduling note: there is NO Central-hour gate here, unlike the other
# workflows. GitHub delivered this workflow's crons 2-5 hours late every
# night of 2026-06-05 → 06-12, so an exact-hour gate skipped every run
# while showing green. The merge is idempotent (full rewrite, upload with
# replace) and takes ~1 minute, so extra/late runs are harmless — multiple
# crons, no gate, every fired run executes.
#
# Required GitHub Secrets (shared with the rest of the pipeline):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET

name: Refresh SambaSafety data

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    # Several slots across the day (UTC). The 06:00/08:00 pair exists so
    # the pre-scorecard refresh lands before the 5am CT brief even when
    # GitHub fires hours late; the 16:00/22:00 slots track the midday and
    # evening CSV drops (11am / 5pm CT in summer).
    - cron: '0 6 * * *'     # 1am CDT / 12am CST
    - cron: '0 8 * * *'     # 3am CDT /  2am CST
    - cron: '0 16 * * *'    # 11am CDT / 10am CST
    - cron: '0 22 * * *'    # 5pm CDT /  4pm CST

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh SambaSafety_Master.xlsx (CSV-drop mode)
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          SAMBASAFETY_OUTPUT_DIR: output/sambasafety
        run: python -m src.sambasafety_main
