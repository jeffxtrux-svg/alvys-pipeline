# SambaSafety data refresh — runs daily, reads the two raw CSV exports
# from OneDrive/SambaSafety/, merges them via src.sambasafety_combine, and
# uploads SambaSafety_Master.xlsx back to OneDrive so the scorecard's page 9
# stays current.
#
# Until SambaSafety's API is wired up, the two source CSVs land in OneDrive
# via Power Automate (or manual drop). See docs/knowledge-base/operations.md
# for the setup steps.
#
# Required GitHub Secrets (shared with the rest of the pipeline):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET

name: Refresh SambaSafety data

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    # Year-round 2:30am Central. CDT (UTC-5) and CST (UTC-6) crons both
    # armed; the "Gate to 2am CT" step rejects the season's wrong slot
    # so the merge happens exactly once per day, well ahead of the
    # scorecard's 5am CT primary.
    - cron: '30 7 * * *'    # 2:30am CDT / 1:30am CST (CST: gated)
    - cron: '30 8 * * *'    # 3:30am CDT (CDT: gated) / 2:30am CST

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Gate to 2am CT
        id: ct_gate
        if: github.event_name == 'schedule'
        run: |
          CT_HOUR=$(TZ=America/Chicago date +%-H)
          echo "Central-time hour: $CT_HOUR"
          if [ "$CT_HOUR" -ne 2 ]; then
            echo "Off-target — skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "2am CT slot — proceeding."
          fi

      - name: Checkout repo
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ct_gate.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.ct_gate.outputs.skip != '1'
        run: pip install -r requirements.txt

      - name: Refresh SambaSafety_Master.xlsx
        if: steps.ct_gate.outputs.skip != '1'
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_UPN: jeff@xfreight.net
          # CSV-drop mode only. The SambaSafety API access was retired
          # 2026-06 (demo-env token expired; GET /organization/v1/groups
          # now returns 404 Forbidden), so the API token is deliberately
          # NOT passed here — the script reads risk_index_report.csv,
          # violationsReport.csv, InvalidLicenseReport.csv and the CSA
          # CSV from OneDrive/SambaSafety/ instead. To re-enable API
          # mode after a renewal, restore:
          #   SAMBASAFETY_API_TOKEN: ${{ secrets.SAMBASAFETY_API_TOKEN }}
          # (src.sambasafety_main also auto-falls back to CSV mode if
          # the API rejects the token, so a stale secret can't break
          # the refresh again.)
          SAMBASAFETY_OUTPUT_DIR: output/sambasafety
        run: python -m src.sambasafety_main
